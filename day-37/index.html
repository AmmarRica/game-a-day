<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Day 37 – Overbold</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      touch-action: none;
      overflow: hidden;
    }
    nav { width: 100%; max-width: 480px; margin-bottom: 0.5rem; }
    nav a { color: #a78bfa; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 0.25rem; }
    p.subtitle { color: #9ca3af; margin-bottom: 0.5rem; font-size: 0.85rem; }
    canvas { border: 2px solid #3b3b5c; border-radius: 8px; background: #1e1e2e; }
    #ui { color: #e0e0ff; font-size: 0.85rem; max-width: 480px; width: 100%; display: flex; justify-content: space-between; margin-top: 0.5rem; }
</style>
</head>
<body>
  <h1>Overbold</h1>
  <p class="subtitle">Roguelike: Swipe to move, tap enemies to attack. Go deeper for more gold!</p>
  <canvas id="gc"></canvas>
  <div id="ui"><span id="floorInfo">Floor 1</span><span id="goldInfo">Gold: 0</span></div>
<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 480, H = 480;
const TILE = 40;
const COLS = Math.floor(W / TILE);
const ROWS = Math.floor(H / TILE);

function resize() {
  const s = Math.min(window.innerWidth - 20, W) / W;
  canvas.width = W; canvas.height = H;
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize(); window.addEventListener('resize', resize);

// Tile types: 0=wall, 1=floor, 2=stairs, 3=gold, 4=potion, 5=chest
let map = [];
let revealed = [];
let player = { x: 1, y: 1, hp: 20, maxHp: 20, atk: 3, def: 1, gold: 0, xp: 0, level: 1 };
let enemies = [];
let items = [];
let floor = 1;
let maxFloor = 10;
let gameState = 'play'; // play, dead, escaped, animating
let messages = [];
let animTimer = 0;
let turnCount = 0;

// Touch
let touchStartPos = null;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches[0];
  touchStartPos = {
    x: (t.clientX - rect.left) * (W / rect.width),
    y: (t.clientY - rect.top) * (H / rect.height)
  };
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (!touchStartPos) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches[0];
  const endX = (t.clientX - rect.left) * (W / rect.width);
  const endY = (t.clientY - rect.top) * (H / rect.height);
  const dx = endX - touchStartPos.x;
  const dy = endY - touchStartPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (gameState === 'dead' || gameState === 'escaped') { restartGame(); touchStartPos = null; return; }
  if (gameState !== 'play') { touchStartPos = null; return; }

  if (dist > 20) {
    // Swipe - move
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  } else {
    // Tap - check if tapping adjacent enemy or tile
    const tileX = Math.floor(endX / TILE);
    const tileY = Math.floor(endY / TILE);
    const ddx = tileX - player.x;
    const ddy = tileY - player.y;
    if (Math.abs(ddx) + Math.abs(ddy) === 1) {
      tryMove(ddx, ddy);
    } else if (ddx === 0 && ddy === 0) {
      // Tap self - wait a turn
      endTurn();
    }
  }
  touchStartPos = null;
}, { passive: false });

// Mouse fallback
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  touchStartPos = { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
});
canvas.addEventListener('mouseup', (e) => {
  if (!touchStartPos) return;
  const rect = canvas.getBoundingClientRect();
  const endX = (e.clientX - rect.left) * (W / rect.width);
  const endY = (e.clientY - rect.top) * (H / rect.height);
  const dx = endX - touchStartPos.x, dy = endY - touchStartPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (gameState === 'dead' || gameState === 'escaped') { restartGame(); touchStartPos = null; return; }
  if (gameState !== 'play') { touchStartPos = null; return; }
  if (dist > 20) {
    if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
    else tryMove(0, dy > 0 ? 1 : -1);
  } else {
    const tileX = Math.floor(endX / TILE), tileY = Math.floor(endY / TILE);
    const ddx = tileX - player.x, ddy = tileY - player.y;
    if (Math.abs(ddx) + Math.abs(ddy) === 1) tryMove(ddx, ddy);
    else if (ddx === 0 && ddy === 0) endTurn();
  }
  touchStartPos = null;
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (gameState === 'dead' || gameState === 'escaped') { restartGame(); return; }
  if (gameState !== 'play') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') tryMove(-1, 0);
  if (e.key === 'ArrowRight' || e.key === 'd') tryMove(1, 0);
  if (e.key === 'ArrowUp' || e.key === 'w') tryMove(0, -1);
  if (e.key === 'ArrowDown' || e.key === 's') tryMove(0, 1);
  if (e.key === ' ') endTurn();
});

function addMessage(msg) {
  messages.unshift(msg);
  if (messages.length > 4) messages.pop();
}

function generateFloor() {
  map = [];
  revealed = [];
  enemies = [];
  items = [];

  // Initialize with walls
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    revealed[r] = [];
    for (let c = 0; c < COLS; c++) {
      map[r][c] = 0;
      revealed[r][c] = false;
    }
  }

  // BSP-lite room generation
  const rooms = [];
  const numRooms = 4 + Math.floor(Math.random() * 3);

  for (let i = 0; i < numRooms; i++) {
    const rw = 3 + Math.floor(Math.random() * 3);
    const rh = 3 + Math.floor(Math.random() * 3);
    const rx = 1 + Math.floor(Math.random() * (COLS - rw - 2));
    const ry = 1 + Math.floor(Math.random() * (ROWS - rh - 2));

    // Check overlap
    let overlaps = false;
    for (let room of rooms) {
      if (rx < room.x + room.w + 1 && rx + rw > room.x - 1 &&
          ry < room.y + room.h + 1 && ry + rh > room.y - 1) {
        overlaps = true;
        break;
      }
    }
    if (overlaps && rooms.length > 0) continue;

    rooms.push({ x: rx, y: ry, w: rw, h: rh });
    for (let r = ry; r < ry + rh; r++) {
      for (let c = rx; c < rx + rw; c++) {
        if (r > 0 && r < ROWS - 1 && c > 0 && c < COLS - 1)
          map[r][c] = 1;
      }
    }
  }

  if (rooms.length < 2) {
    // Fallback: create two rooms
    rooms.length = 0;
    rooms.push({ x: 1, y: 1, w: 4, h: 4 });
    rooms.push({ x: COLS - 6, y: ROWS - 6, w: 4, h: 4 });
    for (let room of rooms) {
      for (let r = room.y; r < room.y + room.h; r++) {
        for (let c = room.x; c < room.x + room.w; c++) {
          map[r][c] = 1;
        }
      }
    }
  }

  // Connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i - 1], b = rooms[i];
    const ax = Math.floor(a.x + a.w / 2), ay = Math.floor(a.y + a.h / 2);
    const bx = Math.floor(b.x + b.w / 2), by = Math.floor(b.y + b.h / 2);

    let cx = ax, cy = ay;
    while (cx !== bx) {
      if (cy > 0 && cy < ROWS - 1 && cx > 0 && cx < COLS - 1) map[cy][cx] = 1;
      cx += cx < bx ? 1 : -1;
    }
    while (cy !== by) {
      if (cy > 0 && cy < ROWS - 1 && cx > 0 && cx < COLS - 1) map[cy][cx] = 1;
      cy += cy < by ? 1 : -1;
    }
  }

  // Place player in first room
  player.x = Math.floor(rooms[0].x + rooms[0].w / 2);
  player.y = Math.floor(rooms[0].y + rooms[0].h / 2);

  // Place stairs in last room
  const lastRoom = rooms[rooms.length - 1];
  const sx = Math.floor(lastRoom.x + lastRoom.w / 2);
  const sy = Math.floor(lastRoom.y + lastRoom.h / 2);
  map[sy][sx] = 2;

  // Place gold
  const goldCount = 3 + floor * 2;
  for (let i = 0; i < goldCount; i++) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const gx = room.x + Math.floor(Math.random() * room.w);
    const gy = room.y + Math.floor(Math.random() * room.h);
    if (map[gy][gx] === 1 && !(gx === player.x && gy === player.y)) {
      map[gy][gx] = 3;
    }
  }

  // Place potions
  const potionCount = Math.max(1, 3 - Math.floor(floor / 3));
  for (let i = 0; i < potionCount; i++) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const px = room.x + Math.floor(Math.random() * room.w);
    const py = room.y + Math.floor(Math.random() * room.h);
    if (map[py][px] === 1 && !(px === player.x && py === player.y)) {
      map[py][px] = 4;
    }
  }

  // Place chests (rare)
  if (Math.random() < 0.4 + floor * 0.05) {
    const room = rooms[Math.floor(Math.random() * rooms.length)];
    const cx = room.x + Math.floor(Math.random() * room.w);
    const cy = room.y + Math.floor(Math.random() * room.h);
    if (map[cy][cx] === 1) map[cy][cx] = 5;
  }

  // Place enemies
  const enemyCount = 2 + floor;
  const enemyTypes = [
    { name: 'Rat', hp: 5, atk: 2, def: 0, xp: 3, color: '#8B7355', char: 'r' },
    { name: 'Goblin', hp: 8, atk: 3, def: 1, xp: 5, color: '#4a8a4a', char: 'g' },
    { name: 'Skeleton', hp: 12, atk: 4, def: 2, xp: 8, color: '#d4d4aa', char: 's' },
    { name: 'Demon', hp: 18, atk: 6, def: 3, xp: 12, color: '#cc3333', char: 'D' },
    { name: 'Dragon', hp: 30, atk: 8, def: 4, xp: 20, color: '#cc6600', char: 'W' }
  ];

  for (let i = 0; i < enemyCount; i++) {
    const room = rooms[1 + Math.floor(Math.random() * (rooms.length - 1))];
    if (!room) continue;
    const ex = room.x + Math.floor(Math.random() * room.w);
    const ey = room.y + Math.floor(Math.random() * room.h);
    if (map[ey][ex] !== 1 || (ex === player.x && ey === player.y)) continue;
    if (enemies.some(e => e.x === ex && e.y === ey)) continue;

    const maxType = Math.min(enemyTypes.length - 1, Math.floor(floor / 2));
    const typeIdx = Math.floor(Math.random() * (maxType + 1));
    const type = enemyTypes[typeIdx];
    const scaling = 1 + (floor - 1) * 0.15;
    enemies.push({
      x: ex, y: ey,
      hp: Math.floor(type.hp * scaling), maxHp: Math.floor(type.hp * scaling),
      atk: Math.floor(type.atk * scaling), def: type.def,
      xp: type.xp + floor, name: type.name,
      color: type.color, char: type.char
    });
  }

  revealAround(player.x, player.y);
}

function revealAround(px, py) {
  for (let dy = -3; dy <= 3; dy++) {
    for (let dx = -3; dx <= 3; dx++) {
      const nx = px + dx, ny = py + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
        if (Math.abs(dx) + Math.abs(dy) <= 4) {
          revealed[ny][nx] = true;
        }
      }
    }
  }
}

function tryMove(dx, dy) {
  if (gameState !== 'play') return;
  const nx = player.x + dx;
  const ny = player.y + dy;

  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  if (map[ny][nx] === 0) return;

  // Check for enemy
  const enemy = enemies.find(e => e.x === nx && e.y === ny && e.hp > 0);
  if (enemy) {
    attackEnemy(enemy);
    endTurn();
    return;
  }

  // Move
  player.x = nx;
  player.y = ny;
  revealAround(nx, ny);

  // Pickup
  const tile = map[ny][nx];
  if (tile === 3) {
    const amount = 5 + floor * 3 + Math.floor(Math.random() * floor * 5);
    player.gold += amount;
    addMessage(`Found ${amount} gold!`);
    map[ny][nx] = 1;
  } else if (tile === 4) {
    const heal = 5 + Math.floor(Math.random() * 5);
    player.hp = Math.min(player.maxHp, player.hp + heal);
    addMessage(`Potion heals ${heal} HP!`);
    map[ny][nx] = 1;
  } else if (tile === 5) {
    const goldAmt = 15 + floor * 8;
    player.gold += goldAmt;
    player.atk += 1;
    addMessage(`Chest: ${goldAmt} gold + ATK up!`);
    map[ny][nx] = 1;
  } else if (tile === 2) {
    // Stairs - choice
    addMessage('Stairs found! Swipe down to descend.');
    if (dy === 1 && dx === 0) {
      // Going down through stairs
      goDeeper();
      return;
    }
  }

  endTurn();
}

function goDeeper() {
  floor++;
  if (floor > maxFloor) {
    gameState = 'escaped';
    addMessage('You escaped with your treasure!');
    return;
  }
  addMessage(`Descending to floor ${floor}...`);
  generateFloor();
}

function attackEnemy(enemy) {
  const dmg = Math.max(1, player.atk - enemy.def + Math.floor(Math.random() * 3));
  enemy.hp -= dmg;
  addMessage(`Hit ${enemy.name} for ${dmg}!`);

  if (enemy.hp <= 0) {
    addMessage(`${enemy.name} defeated! +${enemy.xp} XP`);
    player.xp += enemy.xp;
    // Level up check
    const xpNeeded = player.level * 15;
    if (player.xp >= xpNeeded) {
      player.xp -= xpNeeded;
      player.level++;
      player.maxHp += 5;
      player.hp = Math.min(player.maxHp, player.hp + 5);
      player.atk += 1;
      player.def += 1;
      addMessage(`Level up! Now level ${player.level}`);
    }
    enemies = enemies.filter(e => e !== enemy);
  }
}

function endTurn() {
  turnCount++;

  // Enemy turns
  for (let e of enemies) {
    if (e.hp <= 0) continue;

    // Can this enemy see the player?
    const dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    if (dist > 6) continue; // Too far to notice

    if (dist === 1) {
      // Attack player
      const dmg = Math.max(1, e.atk - player.def + Math.floor(Math.random() * 2));
      player.hp -= dmg;
      addMessage(`${e.name} hits you for ${dmg}!`);
      if (player.hp <= 0) {
        player.hp = 0;
        gameState = 'dead';
        addMessage('You have been slain!');
      }
    } else {
      // Move toward player
      const dx = Math.sign(player.x - e.x);
      const dy = Math.sign(player.y - e.y);

      // Try horizontal or vertical
      let moved = false;
      const tryDirs = Math.random() < 0.5 ? [[dx, 0], [0, dy]] : [[0, dy], [dx, 0]];
      for (let [mx, my] of tryDirs) {
        if (mx === 0 && my === 0) continue;
        const nx = e.x + mx, ny = e.y + my;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== 0) {
          if (!(nx === player.x && ny === player.y) && !enemies.some(o => o !== e && o.x === nx && o.y === ny)) {
            e.x = nx; e.y = ny; moved = true; break;
          }
        }
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, W, H);

  // Draw map
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE, y = r * TILE;
      if (!revealed[r][c]) {
        ctx.fillStyle = '#0a0a15';
        ctx.fillRect(x, y, TILE, TILE);
        continue;
      }

      const dist = Math.abs(c - player.x) + Math.abs(r - player.y);
      const inSight = dist <= 4;
      const dimFactor = inSight ? 1 : 0.4;

      const tile = map[r][c];
      if (tile === 0) {
        ctx.fillStyle = `rgba(30, 30, 50, ${dimFactor})`;
        ctx.fillRect(x, y, TILE, TILE);
        if (inSight) {
          ctx.strokeStyle = 'rgba(59, 59, 92, 0.3)';
          ctx.strokeRect(x, y, TILE, TILE);
        }
      } else {
        ctx.fillStyle = inSight ? '#1e1e2e' : '#141420';
        ctx.fillRect(x, y, TILE, TILE);

        if (tile === 2) {
          // Stairs
          ctx.fillStyle = `rgba(167, 139, 250, ${dimFactor})`;
          ctx.font = '20px system-ui';
          ctx.textAlign = 'center';
          ctx.fillText('>', x + TILE / 2, y + TILE / 2 + 7);
        } else if (tile === 3 && inSight) {
          // Gold
          ctx.fillStyle = '#fbbf24';
          ctx.beginPath();
          ctx.arc(x + TILE / 2, y + TILE / 2, 6, 0, Math.PI * 2);
          ctx.fill();
        } else if (tile === 4 && inSight) {
          // Potion
          ctx.fillStyle = '#ef4444';
          ctx.beginPath();
          ctx.arc(x + TILE / 2, y + TILE / 2 + 2, 6, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#b91c1c';
          ctx.fillRect(x + TILE / 2 - 3, y + TILE / 2 - 6, 6, 6);
        } else if (tile === 5 && inSight) {
          // Chest
          ctx.fillStyle = '#92400e';
          ctx.fillRect(x + 8, y + 12, TILE - 16, TILE - 18);
          ctx.fillStyle = '#fbbf24';
          ctx.fillRect(x + TILE / 2 - 3, y + 18, 6, 6);
        }
      }
    }
  }

  // Enemies
  for (let e of enemies) {
    if (!revealed[e.y][e.x]) continue;
    const dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    if (dist > 4) continue;
    const x = e.x * TILE, y = e.y * TILE;
    ctx.fillStyle = e.color;
    ctx.font = 'bold 24px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(e.char, x + TILE / 2, y + TILE / 2 + 8);
    // HP bar
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(x + 4, y, TILE - 8, 4);
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(x + 4, y, (TILE - 8) * (e.hp / e.maxHp), 4);
    }
  }

  // Player
  const px = player.x * TILE, py = player.y * TILE;
  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 26px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('@', px + TILE / 2, py + TILE / 2 + 9);

  // HUD
  ctx.fillStyle = 'rgba(15, 15, 26, 0.85)';
  ctx.fillRect(0, 0, W, 36);

  ctx.fillStyle = '#e0e0ff';
  ctx.font = '12px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`HP: ${player.hp}/${player.maxHp}`, 8, 14);
  ctx.fillText(`ATK:${player.atk} DEF:${player.def}`, 8, 28);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(`Floor ${floor}`, W / 2, 14);
  ctx.fillStyle = '#9ca3af';
  ctx.fillText(`Lv.${player.level} XP:${player.xp}/${player.level * 15}`, W / 2, 28);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fbbf24';
  ctx.fillText(`Gold: ${player.gold}`, W - 8, 14);

  // HP bar
  const hpBarW = 120;
  ctx.fillStyle = '#333';
  ctx.fillRect(W - hpBarW - 8, 20, hpBarW, 10);
  ctx.fillStyle = player.hp > player.maxHp * 0.3 ? '#4ade80' : '#ef4444';
  ctx.fillRect(W - hpBarW - 8, 20, hpBarW * (player.hp / player.maxHp), 10);

  // Messages
  ctx.textAlign = 'left';
  for (let i = 0; i < messages.length; i++) {
    ctx.fillStyle = `rgba(224, 224, 255, ${1 - i * 0.25})`;
    ctx.font = '11px system-ui';
    ctx.fillText(messages[i], 8, H - 8 - i * 14);
  }

  // Game over / win
  if (gameState === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 32px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('YOU DIED', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fbbf24';
    ctx.font = '20px system-ui';
    ctx.fillText(`Gold collected: ${player.gold}`, W / 2, H / 2);
    ctx.fillText(`Reached floor: ${floor}`, W / 2, H / 2 + 30);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '16px system-ui';
    ctx.fillText('Tap to try again', W / 2, H / 2 + 65);
  }

  if (gameState === 'escaped') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 32px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('ESCAPED!', W / 2, H / 2 - 40);
    ctx.fillStyle = '#e0e0ff';
    ctx.font = '20px system-ui';
    ctx.fillText(`Final gold: ${player.gold}`, W / 2, H / 2);
    ctx.fillText(`Level: ${player.level}`, W / 2, H / 2 + 30);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '16px system-ui';
    ctx.fillText('Tap to play again', W / 2, H / 2 + 65);
  }

  document.getElementById('floorInfo').textContent = `Floor ${floor}/${maxFloor} | Lv.${player.level}`;
  document.getElementById('goldInfo').textContent = `Gold: ${player.gold} | HP: ${player.hp}/${player.maxHp}`;
}

function restartGame() {
  player = { x: 1, y: 1, hp: 20, maxHp: 20, atk: 3, def: 1, gold: 0, xp: 0, level: 1 };
  floor = 1;
  messages = [];
  gameState = 'play';
  turnCount = 0;
  generateFloor();
}

function gameLoop() {
  draw();
  requestAnimationFrame(gameLoop);
}

generateFloor();
addMessage('Find the stairs (>) to descend. Collect gold!');
addMessage('Swipe to move, tap adjacent enemies to attack.');
gameLoop();
</script>
