<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthwave Scramble</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f1a; color: #e0e0ff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
nav { width: 100%; padding: 12px 20px; position: fixed; top: 0; z-index: 100; }
nav a { color: #a78bfa; text-decoration: none; font-size: 16px; }
nav a:hover { color: #c4b5fd; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let state = 'title'; // title, playing, bonus, upgrade, gameover
let player = { x: 0, lane: 2, speed: 4, jukeAbility: 1, stiffArm: 1, sprintDuration: 2, sprinting: false, sprintTimer: 0, sprintCooldown: 0, juking: false, jukeTimer: 0 };
let defenders = [];
let particles = [];
let score = 0, yards = 0, endzone = 100, bonusYards = 0;
let upgradePoints = 0, totalUpgradePoints = 0;
let runNumber = 0;
let gridOffset = 0;
let gameTime = 0;
let defenderDensity = 0.015;
let hitCooldown = 0;
let lives = 3;

// Upgrades
let upgrades = {
  speed: { level: 0, maxLevel: 10, cost: 3, label: 'Speed' },
  juke: { level: 0, maxLevel: 10, cost: 3, label: 'Juke' },
  stiffArm: { level: 0, maxLevel: 10, cost: 4, label: 'Stiff Arm' },
  sprint: { level: 0, maxLevel: 10, cost: 5, label: 'Sprint' }
};

let keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (state === 'title' && (e.code === 'Space' || e.code === 'Enter')) {
    startRun();
  }
  if (state === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) {
    resetGame();
    state = 'title';
  }
  if (state === 'upgrade') {
    if (e.code === 'Digit1' || e.code === 'Numpad1') buyUpgrade('speed');
    if (e.code === 'Digit2' || e.code === 'Numpad2') buyUpgrade('juke');
    if (e.code === 'Digit3' || e.code === 'Numpad3') buyUpgrade('stiffArm');
    if (e.code === 'Digit4' || e.code === 'Numpad4') buyUpgrade('sprint');
    if (e.code === 'Space' || e.code === 'Enter') startRun();
  }
  if (e.code === 'ArrowUp' && state === 'playing') {
    if (player.sprintCooldown <= 0) {
      player.sprinting = true;
      player.sprintTimer = player.sprintDuration;
    }
  }
  if (e.code === 'ArrowDown' && state === 'playing') {
    if (!player.juking) {
      player.juking = true;
      player.jukeTimer = 0.3 * player.jukeAbility;
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

function resetGame() {
  score = 0; runNumber = 0; totalUpgradePoints = 0; lives = 3;
  defenderDensity = 0.015;
  Object.keys(upgrades).forEach(k => upgrades[k].level = 0);
  applyUpgrades();
}

function applyUpgrades() {
  player.speed = 4 + upgrades.speed.level * 0.5;
  player.jukeAbility = 1 + upgrades.juke.level * 0.3;
  player.stiffArm = 1 + upgrades.stiffArm.level * 0.5;
  player.sprintDuration = 2 + upgrades.sprint.level * 0.3;
}

function startRun() {
  state = 'playing';
  runNumber++;
  yards = 0;
  bonusYards = 0;
  defenders = [];
  particles = [];
  player.x = W / 2;
  player.lane = 2;
  player.sprinting = false;
  player.sprintTimer = 0;
  player.sprintCooldown = 0;
  player.juking = false;
  player.jukeTimer = 0;
  hitCooldown = 0;
  gameTime = 0;
  defenderDensity = 0.015 + runNumber * 0.003;
  applyUpgrades();
}

function buyUpgrade(key) {
  let u = upgrades[key];
  if (u.level < u.maxLevel && upgradePoints >= u.cost) {
    upgradePoints -= u.cost;
    u.level++;
    applyUpgrades();
  }
}

function spawnDefender() {
  let lanes = 5;
  let laneWidth = W / lanes;
  let lane = Math.floor(Math.random() * lanes);
  let scale = 0.1;
  defenders.push({
    x: lane * laneWidth + laneWidth / 2,
    z: 200, // distance from player
    lane: lane,
    speed: 1.5 + Math.random() * 1.5 + runNumber * 0.2,
    width: 30,
    active: true,
    stunned: 0
  });
}

function addParticle(x, y, color) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 0.5 + Math.random() * 0.5,
      color
    });
  }
}

// Drawing
function drawSky() {
  let grad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  grad.addColorStop(0, '#0a0020');
  grad.addColorStop(0.3, '#1a0040');
  grad.addColorStop(0.5, '#4a0060');
  grad.addColorStop(0.7, '#c02060');
  grad.addColorStop(0.85, '#f06030');
  grad.addColorStop(1, '#f8c040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Sun
  let sunY = H * 0.42;
  let sunR = 60;
  ctx.fillStyle = '#f8d830';
  ctx.beginPath();
  ctx.arc(W / 2, sunY, sunR, 0, Math.PI * 2);
  ctx.fill();
  // Sun stripes
  for (let i = 0; i < 8; i++) {
    let yy = sunY - sunR + i * (sunR * 2 / 8);
    ctx.fillStyle = '#c02060';
    ctx.fillRect(W / 2 - sunR, yy, sunR * 2, 3);
  }
  // Clip sun bottom
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, H * 0.55, W, 4);
}

function drawGrid() {
  let horizon = H * 0.55;
  let vanishX = W / 2;
  let vanishY = horizon;

  // Floor
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(0, horizon, W, H - horizon);

  // Pulsing intensity
  let pulse = 0.5 + 0.5 * Math.sin(gameTime * 3);

  // Horizontal lines (perspective)
  let lineCount = 20;
  for (let i = 0; i < lineCount; i++) {
    let t = (i + (gridOffset % 1)) / lineCount;
    let y = horizon + (H - horizon) * Math.pow(t, 0.7);
    let alpha = t * 0.8 * (0.6 + pulse * 0.4);
    ctx.strokeStyle = `rgba(255, 0, 200, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Vertical lines (perspective)
  let vLines = 15;
  for (let i = -vLines; i <= vLines; i++) {
    let alpha = (1 - Math.abs(i) / vLines) * 0.6 * (0.6 + pulse * 0.4);
    ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(vanishX, vanishY);
    let bx = vanishX + i * (W / vLines) * 1.5;
    ctx.lineTo(bx, H);
    ctx.stroke();
  }
}

function drawPlayer() {
  let px = player.x;
  let py = H * 0.82;
  let scale = player.juking ? 0.85 : 1;
  let flash = player.sprinting && Math.floor(gameTime * 10) % 2 === 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(px, py + 25 * scale, 18 * scale, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body glow
  if (player.sprinting) {
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 20;
  }

  // Body
  ctx.fillStyle = flash ? '#00ffff' : '#e0e0ff';
  ctx.fillRect(px - 10 * scale, py - 20 * scale, 20 * scale, 30 * scale);
  // Head
  ctx.fillStyle = '#f8d830';
  ctx.beginPath();
  ctx.arc(px, py - 26 * scale, 8 * scale, 0, Math.PI * 2);
  ctx.fill();
  // Jersey number
  ctx.fillStyle = '#ff00c8';
  ctx.font = (12 * scale) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('7', px, py + 2);
  // Legs
  let legAnim = Math.sin(gameTime * 12) * 5;
  ctx.fillStyle = '#e0e0ff';
  ctx.fillRect(px - 7 * scale, py + 10 * scale, 5 * scale, 15 * scale);
  ctx.fillRect(px + 2 * scale, py + 10 * scale, 5 * scale, 15 * scale);
  // Football
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(px + 12 * scale, py - 10 * scale, 4, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;

  // Juke effect
  if (player.juking) {
    ctx.strokeStyle = 'rgba(0,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, 30, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawDefender(d) {
  // Perspective projection
  let horizon = H * 0.55;
  let maxDist = 200;
  let t = 1 - d.z / maxDist;
  if (t <= 0) return;
  let scale = Math.pow(t, 0.7);
  let y = horizon + (H * 0.82 - horizon) * scale;
  let x = W / 2 + (d.x - W / 2) * scale;
  let size = 20 * scale;

  if (d.stunned > 0) {
    ctx.globalAlpha = 0.5;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y + size, size * 0.8, size * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  ctx.shadowColor = '#ff0040';
  ctx.shadowBlur = 10 * scale;

  // Body
  ctx.fillStyle = '#ff0040';
  ctx.fillRect(x - size * 0.4, y - size, size * 0.8, size * 1.3);
  // Head
  ctx.fillStyle = '#c00030';
  ctx.beginPath();
  ctx.arc(x, y - size * 1.1, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - size * 0.2, y - size * 1.15, size * 0.12, size * 0.12);
  ctx.fillRect(x + size * 0.08, y - size * 1.15, size * 0.12, size * 0.12);

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Yards
  ctx.fillStyle = '#e0e0ff';
  ctx.font = '18px monospace';
  ctx.textAlign = 'left';
  let yardText = yards >= endzone ? `BONUS: +${bonusYards} yds` : `${Math.floor(yards)}/${endzone} yards`;
  ctx.fillText(yardText, 20, 60);

  // Score
  ctx.textAlign = 'right';
  ctx.fillText('Score: ' + score, W - 20, 60);
  ctx.fillText('Run #' + runNumber, W - 20, 80);

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ff0040';
  ctx.fillText('Lives: ' + '♥'.repeat(lives), 20, 80);

  // Progress bar
  let barW = 200, barH = 10;
  let barX = (W - barW) / 2, barY = 55;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  let pct = Math.min(1, yards / endzone);
  let barColor = yards >= endzone ? '#f8d830' : '#00ffcc';
  ctx.fillStyle = barColor;
  ctx.fillRect(barX, barY, barW * pct, barH);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(barX, barY, barW, barH);
  // Endzone marker
  ctx.fillStyle = '#f8d830';
  ctx.fillRect(barX + barW - 2, barY - 2, 4, barH + 4);

  // Sprint bar
  if (player.sprinting) {
    let spBarW = 80;
    let spX = W / 2 - spBarW / 2;
    let spY = H * 0.75;
    ctx.fillStyle = '#333';
    ctx.fillRect(spX, spY, spBarW, 6);
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(spX, spY, spBarW * (player.sprintTimer / player.sprintDuration), 6);
  }

  // Controls
  ctx.fillStyle = '#a0a0c060';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEFT/RIGHT: Dodge | UP: Sprint | DOWN: Juke', W / 2, H - 10);

  // Bonus zone indicator
  if (yards >= endzone) {
    let flash = Math.sin(gameTime * 6) > 0;
    ctx.fillStyle = flash ? '#f8d830' : '#ff00c8';
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BONUS ZONE!', W / 2, 110);
  }
}

function drawTitle() {
  drawSky();
  drawGrid();

  ctx.fillStyle = '#ff00c8';
  ctx.font = '48px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff00c8';
  ctx.shadowBlur = 30;
  ctx.fillText('SYNTHWAVE', W / 2, H * 0.25);
  ctx.fillStyle = '#00ffff';
  ctx.shadowColor = '#00ffff';
  ctx.fillText('SCRAMBLE', W / 2, H * 0.33);
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  ctx.fillStyle = '#e0e0ff';
  ctx.font = '16px monospace';
  ctx.fillText('Run the ball to the endzone and beyond!', W / 2, H * 0.45);
  ctx.fillText('LEFT/RIGHT = Dodge  |  UP = Sprint  |  DOWN = Juke', W / 2, H * 0.50);
  ctx.fillText('Reach the endzone, then keep running for upgrades!', W / 2, H * 0.55);

  let flash = Math.sin(gameTime * 4) > 0;
  ctx.fillStyle = flash ? '#f8d830' : '#ff00c8';
  ctx.font = '22px monospace';
  ctx.fillText('PRESS SPACE TO RUN', W / 2, H * 0.7);
}

function drawUpgradeScreen() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#f8d830';
  ctx.font = '28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('UPGRADE YOUR PLAYER', W / 2, 80);

  ctx.fillStyle = '#00ffcc';
  ctx.font = '18px monospace';
  ctx.fillText(`Upgrade Points: ${upgradePoints}`, W / 2, 120);

  let yy = 180;
  let idx = 1;
  Object.keys(upgrades).forEach(key => {
    let u = upgrades[key];
    let canBuy = upgradePoints >= u.cost && u.level < u.maxLevel;
    ctx.fillStyle = canBuy ? '#e0e0ff' : '#606080';
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    let barStr = '';
    for (let i = 0; i < u.maxLevel; i++) barStr += i < u.level ? '█' : '░';
    ctx.fillText(`[${idx}] ${u.label} ${barStr} (Cost: ${u.cost})`, W / 2, yy);
    yy += 40;
    idx++;
  });

  ctx.fillStyle = '#a0a0c0';
  ctx.font = '14px monospace';
  ctx.fillText('Press 1-4 to buy upgrades', W / 2, yy + 20);
  ctx.fillStyle = Math.sin(gameTime * 4) > 0 ? '#f8d830' : '#ff00c8';
  ctx.font = '20px monospace';
  ctx.fillText('PRESS SPACE FOR NEXT RUN', W / 2, yy + 70);
}

function drawGameOver() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff0040';
  ctx.font = '40px monospace';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0040';
  ctx.shadowBlur = 20;
  ctx.fillText('GAME OVER', W / 2, H * 0.3);
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  ctx.fillStyle = '#e0e0ff';
  ctx.font = '20px monospace';
  ctx.fillText(`Final Score: ${score}`, W / 2, H * 0.42);
  ctx.fillText(`Runs: ${runNumber}`, W / 2, H * 0.48);

  ctx.fillStyle = '#f8d830';
  ctx.font = '16px monospace';
  ctx.fillText('PRESS SPACE TO RESTART', W / 2, H * 0.65);
}

function update(dt) {
  gameTime += dt;

  if (state === 'title' || state === 'upgrade' || state === 'gameover') {
    gridOffset += dt * 3;
    return;
  }

  if (state !== 'playing') return;

  let speed = player.speed;
  if (player.sprinting) {
    speed *= 1.8;
    player.sprintTimer -= dt;
    if (player.sprintTimer <= 0) {
      player.sprinting = false;
      player.sprintCooldown = 3;
    }
  }
  if (player.sprintCooldown > 0) player.sprintCooldown -= dt;
  if (player.juking) {
    player.jukeTimer -= dt;
    if (player.jukeTimer <= 0) player.juking = false;
  }
  if (hitCooldown > 0) hitCooldown -= dt;

  // Movement
  let laneWidth = W / 5;
  let moveSpeed = 400;
  if (keys['ArrowLeft']) player.x -= moveSpeed * dt;
  if (keys['ArrowRight']) player.x += moveSpeed * dt;
  player.x = Math.max(30, Math.min(W - 30, player.x));

  // Advance yards
  yards += speed * dt * 3;
  gridOffset += speed * dt * 2;
  score += Math.floor(speed * dt * 10);

  if (yards >= endzone) {
    bonusYards = Math.floor(yards - endzone);
  }

  // Spawn defenders
  if (Math.random() < defenderDensity * (1 + yards * 0.005)) {
    spawnDefender();
  }

  // Update defenders
  defenders.forEach(d => {
    if (!d.active) return;
    d.z -= (speed * 1.5 + d.speed) * dt * 30;
    if (d.stunned > 0) { d.stunned -= dt; return; }

    // Collision
    if (d.z < 15 && d.z > -10 && hitCooldown <= 0) {
      let playerScale = 1;
      let dx = Math.abs(d.x - player.x);
      if (dx < 35) {
        if (player.juking) {
          // Dodge!
          d.active = false;
          score += 50;
          addParticle(player.x, H * 0.82, '#00ffff');
        } else {
          // Stiff arm check
          if (player.stiffArm > 1 && Math.random() < 0.3 * (player.stiffArm - 1)) {
            d.stunned = 1;
            d.z = 25;
            score += 30;
            addParticle(d.x, H * 0.8, '#f8d830');
          } else {
            // HIT!
            lives--;
            hitCooldown = 1;
            addParticle(player.x, H * 0.82, '#ff0040');
            if (lives <= 0) {
              if (yards >= endzone) {
                upgradePoints = Math.floor(bonusYards / 5) + 3;
                totalUpgradePoints += upgradePoints;
                state = 'upgrade';
              } else {
                state = 'gameover';
              }
              return;
            }
          }
        }
      }
    }
    if (d.z < -30) d.active = false;
  });
  defenders = defenders.filter(d => d.active);

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Check if we've gone far enough in bonus zone and want to stop (or died)
  // Player keeps going until hit
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'title') {
    drawTitle();
    return;
  }
  if (state === 'upgrade') {
    drawUpgradeScreen();
    return;
  }
  if (state === 'gameover') {
    drawGameOver();
    return;
  }

  drawSky();
  drawGrid();

  // Sort defenders by z (far first)
  let sorted = [...defenders].sort((a, b) => b.z - a.z);
  sorted.forEach(d => drawDefender(d));

  drawPlayer();

  // Particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  });
  ctx.globalAlpha = 1;

  // Hit flash
  if (hitCooldown > 0.7) {
    ctx.fillStyle = `rgba(255, 0, 64, ${(hitCooldown - 0.7) * 3})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
}

let lastTime = 0;
function loop(timestamp) {
  let dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
<script src="../header.js"></script>
</body>
</html>
