<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game 01 – Game a Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    nav {
      width: 100%;
      max-width: 800px;
      margin-bottom: 2rem;
    }

    nav a {
      color: #a78bfa;
      text-decoration: none;
      font-size: 0.95rem;
    }

    nav a:hover { text-decoration: underline; }

    h1 {
      font-size: 2rem;
      color: #a78bfa;
      margin-bottom: 0.5rem;
    }

    p.subtitle {
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    canvas {
      border: 2px solid #3b3b5c;
      border-radius: 8px;
      background: #1e1e2e;
    }
  </style>
</head>
<body>
  <nav><a href="index.html">&larr; Back to gallery</a></nav>
  <h1>Game 01</h1>
  <p class="subtitle">20260313 #01 – work in progress</p>
  <canvas id="game" width="480" height="320"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#a78bfa';
    ctx.font = 'bold 24px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('Game 01 – work in progress', canvas.width / 2, canvas.height / 2);
  </script>
</body>
</html>
