<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Day 31 – Rail Heist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      touch-action: none;
      overflow: hidden;
    }
    nav { width: 100%; max-width: 480px; margin-bottom: 0.5rem; }
    nav a { color: #a78bfa; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 0.25rem; }
    .sub { color: #9ca3af; font-size: 0.85rem; margin-bottom: 0.5rem; }
    canvas {
      border: 1px solid #3b3b5c;
      border-radius: 8px;
      max-width: 480px;
      width: 100%;
      touch-action: none;
    }
    #ui { color: #9ca3af; font-size: 0.85rem; margin-top: 0.5rem; text-align: center; }
</style>
</head>
<body>
  <h1>Rail Heist</h1>
  <p class="sub">Run along the train, fight bandits, grab loot!</p>
  <canvas id="game" width="480" height="640"></canvas>
  <div id="ui"></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

const W = 480, H = 640;
function resize() {
  const s = Math.min(window.innerWidth / W, (window.innerHeight - 120) / H, 1);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

const STATE = { MENU: 0, PLAY: 1, OVER: 2, WIN: 3 };
let state = STATE.MENU;

// Train is horizontal, camera follows player
const CAR_W = 300;
const CAR_H = 50;
const CAR_GAP = 30;
const GROUND_Y = 460;
const NUM_CARS = 12;

let player, camera, cars, enemies, loot, obstacles, bullets, particles;
let score, hp, maxHp, time, bossAlive, trainScroll;
let swipeStart = null, swipeDir = null;
let tapPos = null, tapTime = 0;
let comboHits = 0, comboTimer = 0;

function initGame() {
  score = 0;
  hp = 100;
  maxHp = 100;
  time = 0;
  bossAlive = true;
  comboHits = 0;
  comboTimer = 0;

  player = {
    x: 50, y: GROUND_Y - 30,
    vx: 0, vy: 0,
    w: 20, h: 30,
    onGround: true,
    facing: 1,
    attacking: false,
    attackTimer: 0,
    car: 0,
    invuln: 0
  };

  camera = { x: 0 };

  // Create train cars
  cars = [];
  for (let i = 0; i < NUM_CARS; i++) {
    cars.push({
      x: i * (CAR_W + CAR_GAP),
      y: GROUND_Y,
      w: CAR_W, h: CAR_H,
      type: i === NUM_CARS - 1 ? 'locomotive' : i === 0 ? 'caboose' : 'car'
    });
  }

  // Spawn enemies on various cars
  enemies = [];
  for (let i = 2; i < NUM_CARS - 1; i++) {
    const numE = 1 + Math.floor(Math.random() * 2);
    for (let j = 0; j < numE; j++) {
      enemies.push({
        x: cars[i].x + 40 + Math.random() * (CAR_W - 80),
        y: GROUND_Y - 28,
        w: 18, h: 28,
        hp: 2 + Math.floor(i / 4),
        maxHp: 2 + Math.floor(i / 4),
        type: Math.random() < 0.3 ? 'gunner' : 'brawler',
        facing: -1,
        shootTimer: 2 + Math.random() * 2,
        moveTimer: Math.random() * 2,
        stunned: 0,
        car: i
      });
    }
  }

  // Boss on locomotive
  enemies.push({
    x: cars[NUM_CARS - 1].x + CAR_W / 2,
    y: GROUND_Y - 35,
    w: 24, h: 35,
    hp: 15,
    maxHp: 15,
    type: 'boss',
    facing: -1,
    shootTimer: 1,
    moveTimer: 0,
    stunned: 0,
    car: NUM_CARS - 1,
    phase: 0
  });

  // Loot on cars
  loot = [];
  for (let i = 1; i < NUM_CARS; i++) {
    const numL = 1 + Math.floor(Math.random() * 3);
    for (let j = 0; j < numL; j++) {
      loot.push({
        x: cars[i].x + 30 + Math.random() * (CAR_W - 60),
        y: GROUND_Y - 18,
        collected: false,
        type: Math.random() < 0.2 ? 'health' : 'gold',
        value: Math.random() < 0.3 ? 50 : 25
      });
    }
  }

  // Obstacles (things to jump over between cars)
  obstacles = [];
  for (let i = 2; i < NUM_CARS; i += 2) {
    obstacles.push({
      x: cars[i].x - CAR_GAP / 2,
      y: GROUND_Y - 25,
      w: CAR_GAP + 10,
      h: 25,
      type: 'gap'
    });
  }

  bullets = [];
  particles = [];
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  const t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
  return { x: (t.clientX - rect.left) * sx, y: (t.clientY - rect.top) * sy };
}

canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMoveT, { passive: false });
canvas.addEventListener('touchend', onEnd, { passive: false });
canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMoveT);
canvas.addEventListener('mouseup', onEnd);

function onStart(e) {
  e.preventDefault();
  if (state === STATE.MENU) { state = STATE.PLAY; initGame(); return; }
  if (state === STATE.OVER || state === STATE.WIN) { state = STATE.MENU; return; }
  const pos = getCanvasPos(e);
  swipeStart = { x: pos.x, y: pos.y, t: Date.now() };
  tapPos = pos;
  tapTime = Date.now();
}

function onMoveT(e) {
  e.preventDefault();
  if (!swipeStart) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - swipeStart.x;
  const dy = pos.y - swipeStart.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 30) {
    if (Math.abs(dy) > Math.abs(dx) && dy < 0) {
      swipeDir = 'up';
    } else if (dx > 0) {
      swipeDir = 'right';
    } else {
      swipeDir = 'left';
    }
  }
}

function onEnd(e) {
  e.preventDefault();
  if (state !== STATE.PLAY) return;

  const pos = getCanvasPos(e);
  const elapsed = Date.now() - (swipeStart ? swipeStart.t : 0);

  if (swipeDir === 'up') {
    // Jump
    if (player.onGround) {
      player.vy = -350;
      player.onGround = false;
    }
  } else if (swipeDir === 'right') {
    player.vx = 200;
    player.facing = 1;
  } else if (swipeDir === 'left') {
    player.vx = -200;
    player.facing = -1;
  } else if (elapsed < 300) {
    // Tap = attack
    player.attacking = true;
    player.attackTimer = 0.2;
    // If tap on right half, face right; left half, face left
    if (tapPos && tapPos.x > W / 2) player.facing = 1;
    else player.facing = -1;

    // Shoot bullet
    bullets.push({
      x: player.x + player.facing * 15,
      y: player.y - 5,
      vx: player.facing * 400,
      life: 0.8,
      friendly: true
    });
  }

  swipeStart = null;
  swipeDir = null;
  tapPos = null;
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 100,
      vy: -Math.random() * 80 - 20,
      life: 0.3 + Math.random() * 0.3,
      color, size: 2 + Math.random() * 3
    });
  }
}

function update(dt) {
  if (state !== STATE.PLAY) return;
  time += dt;

  // Player movement
  player.vx *= 0.9;
  player.vy += 800 * dt; // gravity
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Keep player on train tops
  player.onGround = false;
  cars.forEach((car, i) => {
    if (player.x > car.x - 5 && player.x < car.x + car.w + 5) {
      if (player.y >= car.y - player.h && player.vy >= 0) {
        player.y = car.y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.car = i;
      }
    }
  });

  // Fall off train = damage
  if (player.y > GROUND_Y + 100) {
    hp -= 30;
    // Respawn on nearest car
    const nearCar = cars.reduce((best, c) => Math.abs(c.x + c.w / 2 - player.x) < Math.abs(best.x + best.w / 2 - player.x) ? c : best);
    player.x = nearCar.x + nearCar.w / 2;
    player.y = nearCar.y - player.h - 10;
    player.vy = 0;
    if (hp <= 0) {
      state = STATE.OVER;
      return;
    }
  }

  // Clamp player to train range
  player.x = Math.max(-20, Math.min(cars[NUM_CARS - 1].x + CAR_W + 20, player.x));

  // Attack timer
  if (player.attacking) {
    player.attackTimer -= dt;
    if (player.attackTimer <= 0) player.attacking = false;
  }
  player.invuln = Math.max(0, player.invuln - dt);
  comboTimer = Math.max(0, comboTimer - dt);
  if (comboTimer <= 0) comboHits = 0;

  // Update bullets
  bullets.forEach(b => {
    b.x += b.vx * dt;
    b.life -= dt;
  });
  bullets = bullets.filter(b => b.life > 0);

  // Bullet-enemy collisions
  bullets.forEach(b => {
    if (!b.friendly) {
      // Enemy bullet hits player
      if (player.invuln <= 0 && Math.abs(b.x - player.x) < 15 && Math.abs(b.y - (player.y - 10)) < 20) {
        hp -= 10;
        player.invuln = 0.5;
        b.life = 0;
        spawnParticles(player.x, player.y, '#ff4040', 5);
        if (hp <= 0) state = STATE.OVER;
      }
      return;
    }
    enemies.forEach(en => {
      if (en.hp <= 0) return;
      if (Math.abs(b.x - en.x) < 18 && Math.abs(b.y - en.y) < 20) {
        en.hp--;
        en.stunned = 0.3;
        b.life = 0;
        comboHits++;
        comboTimer = 2;
        spawnParticles(en.x, en.y, '#ffd700', 5);
        if (en.hp <= 0) {
          score += en.type === 'boss' ? 500 : 50 * (1 + comboHits);
          spawnParticles(en.x, en.y, '#ff8800', 15);
          if (en.type === 'boss') {
            bossAlive = false;
            state = STATE.WIN;
          }
        }
      }
    });
  });

  // Melee attack
  if (player.attacking && player.attackTimer > 0.15) {
    const reach = 35;
    enemies.forEach(en => {
      if (en.hp <= 0 || en.stunned > 0) return;
      const dx = en.x - player.x;
      if (Math.abs(dx) < reach && Math.sign(dx) === player.facing && Math.abs(en.y - player.y) < 30) {
        en.hp -= 2;
        en.stunned = 0.4;
        en.x += player.facing * 20;
        comboHits++;
        comboTimer = 2;
        spawnParticles(en.x, en.y, '#ffd700', 8);
        if (en.hp <= 0) {
          score += en.type === 'boss' ? 500 : 50 * (1 + comboHits);
          spawnParticles(en.x, en.y, '#ff8800', 15);
          if (en.type === 'boss') {
            bossAlive = false;
            state = STATE.WIN;
          }
        }
      }
    });
  }

  // Enemy AI
  enemies.forEach(en => {
    if (en.hp <= 0) return;
    en.stunned = Math.max(0, en.stunned - dt);
    if (en.stunned > 0) return;

    const dx = player.x - en.x;
    en.facing = dx > 0 ? 1 : -1;

    if (en.type === 'brawler') {
      // Move toward player if on same or adjacent car
      if (Math.abs(en.car - player.car) <= 1) {
        en.x += en.facing * 60 * dt;
        // Punch player
        if (Math.abs(dx) < 25 && Math.abs(player.y - en.y) < 20 && player.invuln <= 0) {
          hp -= 8;
          player.invuln = 0.5;
          player.vx = en.facing * 100;
          spawnParticles(player.x, player.y, '#ff4040', 5);
          if (hp <= 0) state = STATE.OVER;
        }
      }
    } else if (en.type === 'gunner') {
      en.shootTimer -= dt;
      if (en.shootTimer <= 0 && Math.abs(dx) < 350) {
        en.shootTimer = 1.5 + Math.random();
        bullets.push({
          x: en.x + en.facing * 12,
          y: en.y - 5,
          vx: en.facing * 250,
          life: 1.2,
          friendly: false
        });
      }
    } else if (en.type === 'boss') {
      en.shootTimer -= dt;
      // Boss: alternates between charge and shoot
      en.phase = Math.floor(time / 3) % 2;
      if (en.phase === 0) {
        // Charge
        en.x += en.facing * 80 * dt;
        if (Math.abs(dx) < 25 && player.invuln <= 0) {
          hp -= 15;
          player.invuln = 0.8;
          player.vx = en.facing * 150;
          spawnParticles(player.x, player.y, '#ff4040', 8);
          if (hp <= 0) state = STATE.OVER;
        }
      } else {
        // Shoot burst
        if (en.shootTimer <= 0) {
          en.shootTimer = 0.4;
          bullets.push({
            x: en.x + en.facing * 15,
            y: en.y - 8,
            vx: en.facing * 300,
            life: 1.0,
            friendly: false
          });
        }
      }
      // Keep boss on locomotive
      const loc = cars[NUM_CARS - 1];
      en.x = Math.max(loc.x + 20, Math.min(loc.x + loc.w - 20, en.x));
    }

    // Keep enemy on their car
    const car = cars[en.car];
    if (car) en.x = Math.max(car.x + 10, Math.min(car.x + car.w - 10, en.x));
  });

  // Loot collection
  loot.forEach(l => {
    if (l.collected) return;
    if (Math.abs(player.x - l.x) < 20 && Math.abs(player.y - l.y + 15) < 25) {
      l.collected = true;
      if (l.type === 'health') {
        hp = Math.min(maxHp, hp + 25);
        spawnParticles(l.x, l.y, '#44ff88', 8);
      } else {
        score += l.value;
        spawnParticles(l.x, l.y, '#ffd700', 8);
      }
    }
  });

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);

  // Camera
  const targetCam = player.x - W / 2;
  camera.x += (targetCam - camera.x) * 4 * dt;
  camera.x = Math.max(0, Math.min(cars[NUM_CARS - 1].x + CAR_W - W, camera.x));
}

function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  if (state === STATE.MENU) { drawMenu(); return; }
  if (state === STATE.OVER) { drawOver(); return; }
  if (state === STATE.WIN) { drawWin(); return; }

  const cx = camera.x;

  // Sky gradient (sunset)
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGrad.addColorStop(0, '#1a1040');
  skyGrad.addColorStop(0.5, '#3a1850');
  skyGrad.addColorStop(1, '#ff6644');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Desert ground
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, GROUND_Y + CAR_H + 20, W, H - GROUND_Y - CAR_H - 20);

  // Scrolling desert elements
  for (let i = 0; i < 8; i++) {
    const bx = i * 500 - (cx * 0.3) % 500;
    ctx.fillStyle = '#6B4914';
    ctx.beginPath();
    ctx.moveTo(bx, GROUND_Y + CAR_H + 20);
    ctx.lineTo(bx + 20, GROUND_Y + CAR_H - 10);
    ctx.lineTo(bx + 40, GROUND_Y + CAR_H + 20);
    ctx.fill();
  }

  // Train tracks
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  for (let r = -1; r <= 1; r += 2) {
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + CAR_H + 10 + r * 8);
    ctx.lineTo(W, GROUND_Y + CAR_H + 10 + r * 8);
    ctx.stroke();
  }
  // Ties
  ctx.strokeStyle = '#664';
  ctx.lineWidth = 4;
  for (let i = 0; i < W / 20 + 1; i++) {
    const tx = i * 20 - (cx * 2) % 20;
    ctx.beginPath();
    ctx.moveTo(tx, GROUND_Y + CAR_H + 2);
    ctx.lineTo(tx, GROUND_Y + CAR_H + 18);
    ctx.stroke();
  }

  // Draw train cars
  cars.forEach((car, i) => {
    const sx = car.x - cx;
    if (sx > W + 10 || sx + car.w < -10) return;

    // Car body
    if (car.type === 'locomotive') {
      ctx.fillStyle = '#4a1a1a';
      ctx.fillRect(sx, car.y - 10, car.w, car.h + 10);
      // Smokestack
      ctx.fillStyle = '#333';
      ctx.fillRect(sx + car.w - 40, car.y - 40, 20, 30);
      // Smoke
      ctx.fillStyle = 'rgba(100,100,100,0.4)';
      const st = time * 2;
      ctx.beginPath();
      ctx.arc(sx + car.w - 30 + Math.sin(st) * 10, car.y - 50 - Math.abs(Math.sin(st)) * 20, 12, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = i % 2 === 0 ? '#3a2a1a' : '#2a1a0a';
      ctx.fillRect(sx, car.y, car.w, car.h);
      // Roof edge
      ctx.fillStyle = '#555';
      ctx.fillRect(sx, car.y - 2, car.w, 4);
    }

    // Wheels
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(sx + 30, car.y + car.h + 8, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + car.w - 30, car.y + car.h + 8, 8, 0, Math.PI * 2);
    ctx.fill();

    // Connector
    if (i < NUM_CARS - 1) {
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(sx + car.w, car.y + car.h / 2);
      ctx.lineTo(sx + car.w + CAR_GAP, car.y + car.h / 2);
      ctx.stroke();
    }
  });

  // Draw loot
  loot.forEach(l => {
    if (l.collected) return;
    const sx = l.x - cx;
    if (sx < -10 || sx > W + 10) return;
    const bob = Math.sin(time * 3 + l.x) * 3;
    if (l.type === 'health') {
      ctx.fillStyle = '#44ff88';
      ctx.font = '16px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('+', sx, l.y + bob);
    } else {
      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(sx, l.y + bob, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aa8800';
      ctx.font = 'bold 8px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('$', sx, l.y + bob + 3);
    }
  });

  // Draw enemies
  enemies.forEach(en => {
    if (en.hp <= 0) return;
    const sx = en.x - cx;
    if (sx < -30 || sx > W + 30) return;

    const flash = en.stunned > 0 && Math.sin(en.stunned * 30) > 0;
    if (flash) return;

    if (en.type === 'boss') {
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(sx - en.w / 2, en.y - en.h, en.w, en.h);
      // Boss hat
      ctx.fillStyle = '#111';
      ctx.fillRect(sx - 15, en.y - en.h - 10, 30, 10);
      ctx.fillRect(sx - 10, en.y - en.h - 20, 20, 10);
      // HP bar
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(sx - 20, en.y - en.h - 30, 40, 5);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(sx - 20, en.y - en.h - 30, 40 * (en.hp / en.maxHp), 5);
    } else {
      ctx.fillStyle = en.type === 'gunner' ? '#885533' : '#664422';
      ctx.fillRect(sx - en.w / 2, en.y - en.h, en.w, en.h);
      // Bandana
      ctx.fillStyle = '#cc3333';
      ctx.fillRect(sx - en.w / 2 - 2, en.y - en.h, en.w + 4, 6);
      if (en.type === 'gunner') {
        // Gun
        ctx.fillStyle = '#333';
        ctx.fillRect(sx + en.facing * 8, en.y - 15, en.facing * 10, 3);
      }
    }
  });

  // Draw bullets
  bullets.forEach(b => {
    const sx = b.x - cx;
    if (sx < -5 || sx > W + 5) return;
    ctx.fillStyle = b.friendly ? '#ffdd44' : '#ff4444';
    ctx.fillRect(sx - 4, b.y - 1.5, 8, 3);
  });

  // Draw player
  const px = player.x - cx;
  const py = player.y;
  const flash = player.invuln > 0 && Math.sin(player.invuln * 20) > 0;
  if (!flash) {
    // Body
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(px - player.w / 2, py - player.h, player.w, player.h);
    // Hat
    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(px - 12, py - player.h - 6, 24, 6);
    ctx.fillRect(px - 8, py - player.h - 14, 16, 8);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + player.facing * 3 - 2, py - player.h + 8, 4, 4);
    // Attack animation
    if (player.attacking) {
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(px + player.facing * 25, py - 15, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw particles
  particles.forEach(p => {
    const sx = p.x - cx;
    ctx.globalAlpha = Math.max(0, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(sx - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // HUD
  // HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(10, 10, 150, 18);
  ctx.fillStyle = hp > 50 ? '#44cc44' : hp > 25 ? '#ffaa00' : '#ff4444';
  ctx.fillRect(12, 12, 146 * (hp / maxHp), 14);
  ctx.fillStyle = '#fff';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`HP: ${Math.ceil(hp)}`, 16, 23);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 16px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(`$${score}`, W - 10, 25);

  // Progress bar (how far along the train)
  const progress = player.x / (cars[NUM_CARS - 1].x + CAR_W);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(W / 2 - 80, 10, 160, 8);
  ctx.fillStyle = '#a78bfa';
  ctx.fillRect(W / 2 - 80, 10, 160 * progress, 8);
  ctx.fillStyle = '#e0e0ff';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(`Car ${player.car + 1}/${NUM_CARS}`, W / 2, 30);

  if (comboHits > 1 && comboTimer > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px system-ui';
    ctx.fillText(`${comboHits}x Combo!`, W / 2, 50);
  }

  // Controls hint
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Swipe: move/jump | Tap: shoot', W / 2, H - 10);

  ui.textContent = 'Swipe left/right to move, up to jump. Tap to shoot!';
}

function drawMenu() {
  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 36px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('RAIL HEIST', W / 2, H / 2 - 80);

  // Train silhouette
  ctx.fillStyle = '#3a2a1a';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(60 + i * 100, H / 2 + 100, 80, 30);
  }
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(40, H / 2 + 140);
  ctx.lineTo(W - 40, H / 2 + 140);
  ctx.stroke();

  ctx.fillStyle = '#e0e0ff';
  ctx.font = '16px system-ui';
  ctx.fillText('Fight your way across the train!', W / 2, H / 2 - 30);
  ctx.fillText('Defeat the boss at the locomotive.', W / 2, H / 2);
  ctx.fillStyle = '#9ca3af';
  ctx.font = '14px system-ui';
  ctx.fillText('Swipe to move/jump, Tap to attack', W / 2, H / 2 + 35);

  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 20px system-ui';
  ctx.fillText('Tap to Start', W / 2, H / 2 + 80);
}

function drawOver() {
  ctx.fillStyle = '#ff4040';
  ctx.font = 'bold 36px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('BUSTED!', W / 2, H / 2 - 40);
  ctx.fillStyle = '#e0e0ff';
  ctx.font = '20px system-ui';
  ctx.fillText(`Loot: $${score}`, W / 2, H / 2 + 10);
  ctx.fillStyle = '#a78bfa';
  ctx.font = '16px system-ui';
  ctx.fillText('Tap to try again', W / 2, H / 2 + 60);
}

function drawWin() {
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 36px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('TRAIN ROBBED!', W / 2, H / 2 - 40);
  ctx.fillStyle = '#e0e0ff';
  ctx.font = '20px system-ui';
  ctx.fillText(`Total Loot: $${score}`, W / 2, H / 2 + 10);
  ctx.fillStyle = '#a78bfa';
  ctx.font = '16px system-ui';
  ctx.fillText('Tap to play again', W / 2, H / 2 + 60);
}

let lastT = performance.now();
function gameLoop(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
<script src="../header.js"></script>
</body>
</html>
