<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Day 06 – Ninpek – Game a Day</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      touch-action: none;
      overflow: hidden;
    }
    nav { width: 100%; max-width: 480px; margin-bottom: 0.5rem; }
    nav a { color: #a78bfa; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 0.25rem; }
    p.subtitle { color: #9ca3af; margin-bottom: 0.5rem; font-size: 0.85rem; }
    canvas {
      border: 2px solid #3b3b5c;
      border-radius: 8px;
      background: #1e1e2e;
      max-width: 480px;
      width: 100%;
      touch-action: none;
    }
    #ui { color: #9ca3af; margin-top: 0.5rem; font-size: 0.8rem; text-align: center; }
</style>
</head>
<body>
  <h1>Ninpek</h1>
  <p class="subtitle">Left/right to move, swipe up to jump, tap to throw shuriken!</p>
  <canvas id="game"></canvas>
  <div id="ui">Wave 1 | Score: 0 | HP: 5</div>
  <script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');

let W, H, scale;
function resize() {
  const maxW = 480, maxH = 640;
  const ratio = maxW / maxH;
  let w = Math.min(window.innerWidth - 20, maxW);
  let h = w / ratio;
  if (h > window.innerHeight - 140) { h = window.innerHeight - 140; w = h * ratio; }
  canvas.width = maxW; canvas.height = maxH;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  W = maxW; H = maxH;
  scale = w / maxW;
}
resize();
window.addEventListener('resize', resize);

const GRAVITY = 0.6;
const GROUND_Y = H - 60;
const WALL_W = 40;

let player, shurikens, enemies, particles, wave, score, kills, killsNeeded;
let gameState, spawnTimer, waveDelay;
let touchStartX, touchStartY, touchStartTime;

const PLATFORM_Y = [GROUND_Y, GROUND_Y - 120, GROUND_Y - 240, GROUND_Y - 360];
const PLATFORMS = [
  { x: 0, y: GROUND_Y, w: W, h: 60 },
  { x: 80, y: GROUND_Y - 120, w: 120, h: 12 },
  { x: W - 200, y: GROUND_Y - 120, w: 120, h: 12 },
  { x: W / 2 - 60, y: GROUND_Y - 240, w: 120, h: 12 },
  { x: 60, y: GROUND_Y - 340, w: 100, h: 12 },
  { x: W - 160, y: GROUND_Y - 340, w: 100, h: 12 },
];

const WALLS = [
  { x: 0, y: 0, w: WALL_W, h: H },
  { x: W - WALL_W, y: 0, w: WALL_W, h: H },
];

class Player {
  constructor() {
    this.x = W / 2; this.y = GROUND_Y - 30;
    this.w = 20; this.h = 30; this.vx = 0; this.vy = 0;
    this.onGround = false; this.facing = 1; this.hp = 5;
    this.moveDir = 0; this.invincible = 0;
    this.wallSlide = 0; // -1 left wall, 1 right wall, 0 none
    this.canWallJump = false; this.jumpCount = 0;
    this.frame = 0; this.frameTimer = 0;
    this.throwCooldown = 0;
  }
}

function createEnemy(type) {
  const side = Math.random() < 0.5 ? 0 : 1;
  const e = {
    x: side === 0 ? WALL_W + 10 : W - WALL_W - 10,
    y: GROUND_Y - 24,
    w: 18, h: 24, vx: 0, vy: 0,
    hp: type === 'big' ? 3 : 1,
    type, speed: type === 'fast' ? 3 : type === 'big' ? 1 : 1.8,
    facing: side === 0 ? 1 : -1,
    onGround: false, alive: true,
    frame: 0, frameTimer: 0,
    attackTimer: type === 'ranged' ? 2 : 0,
    color: type === 'fast' ? '#f59e0b' : type === 'big' ? '#dc2626' : type === 'ranged' ? '#8b5cf6' : '#22c55e',
  };
  // Place on random platform sometimes
  if (Math.random() < 0.3 && wave > 2) {
    const p = PLATFORMS[1 + Math.floor(Math.random() * (PLATFORMS.length - 1))];
    e.x = p.x + Math.random() * p.w;
    e.y = p.y - e.h;
  }
  return e;
}

function init() {
  player = new Player();
  shurikens = []; enemies = []; particles = [];
  wave = 1; score = 0; kills = 0; killsNeeded = 5;
  gameState = 'play'; spawnTimer = 1; waveDelay = 0;
  spawnWave();
}

function spawnWave() {
  const count = 3 + wave;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (gameState !== 'play') return;
      let type = 'normal';
      const r = Math.random();
      if (wave >= 3 && r < 0.15) type = 'big';
      else if (wave >= 2 && r < 0.35) type = 'fast';
      else if (wave >= 4 && r < 0.5) type = 'ranged';
      enemies.push(createEnemy(type));
    }, i * 800);
  }
  killsNeeded = count;
  kills = 0;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 - 2,
      life: 20 + Math.random() * 15, maxLife: 35, color, size: 2 + Math.random() * 3
    });
  }
}

function throwShuriken() {
  if (player.throwCooldown > 0) return;
  player.throwCooldown = 12;
  shurikens.push({
    x: player.x + player.facing * 15,
    y: player.y + 8,
    vx: player.facing * 8,
    vy: 0,
    life: 60,
    rotation: 0,
  });
}

function collidePlatforms(obj) {
  obj.onGround = false;
  obj.wallSlide = 0;

  for (const p of PLATFORMS) {
    if (obj.x + obj.w > p.x && obj.x < p.x + p.w) {
      if (obj.vy >= 0 && obj.y + obj.h > p.y && obj.y + obj.h < p.y + p.h + obj.vy + 2) {
        obj.y = p.y - obj.h;
        obj.vy = 0;
        obj.onGround = true;
      }
    }
  }

  // Wall collision + wall slide
  for (const w of WALLS) {
    if (obj.x < w.x + w.w && obj.x + obj.w > w.x && obj.y + obj.h > w.y && obj.y < w.y + w.h) {
      if (obj.x < W / 2) {
        obj.x = w.x + w.w;
        if (!obj.onGround && obj.vy > 0 && obj === player) {
          obj.wallSlide = -1;
          obj.canWallJump = true;
        }
      } else {
        obj.x = w.x - obj.w;
        if (!obj.onGround && obj.vy > 0 && obj === player) {
          obj.wallSlide = 1;
          obj.canWallJump = true;
        }
      }
      obj.vx = 0;
    }
  }
}

function update() {
  if (gameState !== 'play') return;

  const p = player;

  // Movement
  p.vx = p.moveDir * 4;
  if (p.moveDir !== 0) p.facing = p.moveDir;

  // Gravity + wall slide
  p.vy += GRAVITY;
  if (p.wallSlide !== 0 && p.vy > 2) p.vy = 2; // slow fall on wall
  if (p.vy > 14) p.vy = 14;

  p.x += p.vx;
  p.y += p.vy;
  collidePlatforms(p);
  if (p.onGround) { p.jumpCount = 0; p.canWallJump = false; }

  // Invincibility
  if (p.invincible > 0) p.invincible--;

  // Throw cooldown
  if (p.throwCooldown > 0) p.throwCooldown--;

  // Animation
  p.frameTimer++;
  if (p.frameTimer > 6) { p.frameTimer = 0; p.frame = (p.frame + 1) % 4; }

  // Shurikens
  for (let i = shurikens.length - 1; i >= 0; i--) {
    const s = shurikens[i];
    s.x += s.vx; s.y += s.vy;
    s.rotation += 0.3; s.life--;
    if (s.life <= 0 || s.x < 0 || s.x > W) { shurikens.splice(i, 1); continue; }

    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (!e.alive) continue;
      if (s.x > e.x && s.x < e.x + e.w && s.y > e.y && s.y < e.y + e.h) {
        e.hp--;
        shurikens.splice(i, 1);
        spawnParticles(s.x, s.y, '#fff', 5);
        if (e.hp <= 0) {
          e.alive = false;
          kills++;
          score += e.type === 'big' ? 30 : e.type === 'fast' ? 20 : e.type === 'ranged' ? 25 : 10;
          spawnParticles(e.x + e.w/2, e.y + e.h/2, e.color, 15);
        }
        break;
      }
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    // AI: move toward player
    const dx = p.x - e.x;
    if (e.type === 'ranged') {
      // Stay at distance
      if (Math.abs(dx) < 100) e.vx = -Math.sign(dx) * e.speed;
      else if (Math.abs(dx) > 200) e.vx = Math.sign(dx) * e.speed;
      else e.vx = 0;
      // Shoot
      e.attackTimer -= 1/60;
      if (e.attackTimer <= 0) {
        e.attackTimer = 1.5;
        shurikens.push({ x: e.x + e.w/2, y: e.y + 10, vx: Math.sign(dx) * 5, vy: 0, life: 50, rotation: 0, enemy: true });
      }
    } else {
      e.vx = Math.sign(dx) * e.speed;
      // Jump if on ground and player is above or blocked
      if (e.onGround && (p.y < e.y - 30 || Math.random() < 0.01)) {
        e.vy = -10;
      }
    }

    e.facing = Math.sign(dx) || 1;
    e.vy += GRAVITY;
    if (e.vy > 12) e.vy = 12;
    e.x += e.vx;
    e.y += e.vy;
    collidePlatforms(e);

    // Collide with player
    if (p.invincible <= 0) {
      if (p.x + p.w > e.x && p.x < e.x + e.w && p.y + p.h > e.y && p.y < e.y + e.h) {
        p.hp--;
        p.invincible = 60;
        p.vy = -8;
        p.vx = Math.sign(p.x - e.x) * 6;
        spawnParticles(p.x + p.w/2, p.y + p.h/2, '#ef4444', 10);
        if (p.hp <= 0) { gameState = 'gameover'; return; }
      }
    }
  }

  // Enemy shuriken hitting player
  for (let i = shurikens.length - 1; i >= 0; i--) {
    const s = shurikens[i];
    if (!s.enemy) continue;
    if (p.invincible <= 0 && s.x > p.x && s.x < p.x + p.w && s.y > p.y && s.y < p.y + p.h) {
      p.hp--;
      p.invincible = 60;
      spawnParticles(s.x, s.y, '#ef4444', 8);
      shurikens.splice(i, 1);
      if (p.hp <= 0) { gameState = 'gameover'; return; }
    }
  }

  // Clean dead enemies
  enemies = enemies.filter(e => e.alive || e.y < H + 50);

  // Wave complete
  if (kills >= killsNeeded && enemies.filter(e => e.alive).length === 0) {
    wave++;
    if (wave > 15) { gameState = 'win'; return; }
    spawnWave();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--;
    if (pt.life <= 0) particles.splice(i, 1);
  }

  ui.textContent = `Wave ${wave} | Score: ${score} | HP: ${p.hp}`;
}

function draw() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  // Background - stars/dots
  ctx.fillStyle = '#2a2a4a';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 127 + 31) % W, sy = (i * 83 + 17) % (H - 100);
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Walls
  ctx.fillStyle = '#2a2a3e';
  WALLS.forEach(w => {
    ctx.fillRect(w.x, w.y, w.w, w.h);
    // Brick pattern
    ctx.strokeStyle = '#3b3b5c';
    ctx.lineWidth = 1;
    for (let y = 0; y < H; y += 20) {
      const off = (Math.floor(y / 20) % 2) * 10;
      ctx.strokeRect(w.x + off, y, 20, 20);
    }
  });

  // Platforms
  PLATFORMS.forEach((p, i) => {
    if (i === 0) {
      ctx.fillStyle = '#3b3b5c';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#4a4a6a';
      ctx.fillRect(p.x, p.y, p.w, 4);
    } else {
      ctx.fillStyle = '#4b5563';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#6b7280';
      ctx.fillRect(p.x, p.y, p.w, 3);
    }
  });

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y, e.w, e.h);
    // Face
    ctx.fillStyle = '#000';
    const eyeX = e.facing > 0 ? e.x + 12 : e.x + 4;
    ctx.fillRect(eyeX, e.y + 5, 3, 3);
    // HP bar for big enemies
    if (e.type === 'big' && e.hp > 1) {
      ctx.fillStyle = '#ef4444';
      ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / 3), 3);
    }
    // Type indicator
    if (e.type === 'ranged') {
      ctx.fillStyle = '#c4b5fd';
      ctx.fillRect(e.x + e.w/2 - 2, e.y - 4, 4, 4);
    }
  });

  // Player
  const p = player;
  if (gameState === 'play' || gameState === 'gameover') {
    if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2) {
      // flash
    } else {
      // Body
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(p.x - 1, p.y - 1, p.w + 2, p.h + 2);
      ctx.fillStyle = '#4a4a6a';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // Ninja mask
      ctx.fillStyle = '#a78bfa';
      ctx.fillRect(p.x + 2, p.y + 4, p.w - 4, 8);
      // Eyes
      ctx.fillStyle = '#fff';
      const ex = p.facing > 0 ? p.x + 12 : p.x + 5;
      ctx.fillRect(ex, p.y + 6, 4, 3);
      // Headband tail
      ctx.fillStyle = '#a78bfa';
      const tailDir = -p.facing;
      ctx.fillRect(p.x + (tailDir > 0 ? p.w : -8), p.y + 6, 8, 2);
      ctx.fillRect(p.x + (tailDir > 0 ? p.w + 4 : -12), p.y + 8, 8, 2);
      // Wall slide indicator
      if (p.wallSlide !== 0) {
        ctx.fillStyle = 'rgba(167, 139, 250, 0.4)';
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(p.x + p.w/2 - 1, p.y + p.h + i * 6, 2, 4);
        }
      }
    }
  }

  // Shurikens
  shurikens.forEach(s => {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rotation);
    ctx.fillStyle = s.enemy ? '#ef4444' : '#e0e0ff';
    const ss = 6;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      ctx.lineTo(Math.cos(a) * ss, Math.sin(a) * ss);
      const a2 = ((i + 0.5) / 4) * Math.PI * 2;
      ctx.lineTo(Math.cos(a2) * ss * 0.4, Math.sin(a2) * ss * 0.4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  });

  // Particles
  particles.forEach(pt => {
    ctx.globalAlpha = pt.life / pt.maxLife;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
  });
  ctx.globalAlpha = 1;

  // HP bar at top
  if (gameState === 'play') {
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = i < p.hp ? '#ef4444' : '#333';
      ctx.fillRect(W/2 - 60 + i * 25, 10, 20, 8);
    }
  }

  // Overlays
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 44px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('DEFEATED', W/2, H/2 - 30);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '20px system-ui';
    ctx.fillText(`Wave ${wave} | Score: ${score}`, W/2, H/2 + 10);
    ctx.fillText('Tap to retry', W/2, H/2 + 45);
  } else if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#a78bfa';
    ctx.font = 'bold 44px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('NINJA MASTER!', W/2, H/2 - 30);
    ctx.fillStyle = '#9ca3af';
    ctx.font = '20px system-ui';
    ctx.fillText(`Score: ${score}`, W/2, H/2 + 10);
    ctx.fillText('Tap to play again', W/2, H/2 + 45);
  }
}

// Touch controls
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'gameover' || gameState === 'win') { init(); return; }
  const rect = canvas.getBoundingClientRect();
  const tx = (e.changedTouches[0].clientX - rect.left) / scale;
  const ty = (e.changedTouches[0].clientY - rect.top) / scale;
  touchStartX = tx; touchStartY = ty;
  touchStartTime = Date.now();

  // Move direction based on touch position
  if (tx < W * 0.35) player.moveDir = -1;
  else if (tx > W * 0.65) player.moveDir = 1;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gameState !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const tx = (e.changedTouches[0].clientX - rect.left) / scale;
  const ty = (e.changedTouches[0].clientY - rect.top) / scale;

  // Check for swipe up
  if (touchStartY - ty > 40) {
    if (player.canWallJump && player.wallSlide !== 0) {
      // Wall jump
      player.vy = -11;
      player.vx = -player.wallSlide * 6;
      player.facing = -player.wallSlide;
      player.wallSlide = 0;
      player.canWallJump = false;
      spawnParticles(player.x + player.w/2, player.y + player.h, '#a78bfa', 5);
    } else if (player.onGround || player.jumpCount < 2) {
      player.vy = -11;
      player.jumpCount++;
      spawnParticles(player.x + player.w/2, player.y + player.h, '#a78bfa', 5);
    }
    touchStartY = ty;
  }

  if (tx < W * 0.35) player.moveDir = -1;
  else if (tx > W * 0.65) player.moveDir = 1;
  else player.moveDir = 0;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameState !== 'play') return;
  const rect = canvas.getBoundingClientRect();
  const tx = (e.changedTouches[0].clientX - rect.left) / scale;
  const ty = (e.changedTouches[0].clientY - rect.top) / scale;
  const elapsed = Date.now() - touchStartTime;
  const dx = tx - touchStartX, dy = ty - touchStartY;

  // Quick tap = throw shuriken
  if (elapsed < 250 && Math.abs(dx) < 20 && Math.abs(dy) < 20) {
    // If tapped top area, jump instead
    if (ty < H * 0.25) {
      if (player.canWallJump && player.wallSlide !== 0) {
        player.vy = -11;
        player.vx = -player.wallSlide * 6;
        player.wallSlide = 0;
        player.canWallJump = false;
      } else if (player.onGround || player.jumpCount < 2) {
        player.vy = -11;
        player.jumpCount++;
      }
    } else {
      throwShuriken();
    }
  }

  player.moveDir = 0;
  // Check remaining touches
  if (e.touches.length > 0) {
    const rt = e.touches[0];
    const rtx = (rt.clientX - rect.left) / scale;
    if (rtx < W * 0.35) player.moveDir = -1;
    else if (rtx > W * 0.65) player.moveDir = 1;
  }
}, { passive: false });

// Keyboard
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'ArrowUp') {
    if (player && (player.onGround || player.jumpCount < 2)) {
      player.vy = -11; player.jumpCount++;
    }
  }
  if (e.key === 'z' || e.key === 'x') throwShuriken();
  if (gameState === 'gameover' || gameState === 'win') init();
});
window.addEventListener('keyup', e => keys[e.key] = false);

function loop() {
  if (keys['ArrowLeft'] || keys['a']) player.moveDir = -1;
  else if (keys['ArrowRight'] || keys['d']) player.moveDir = 1;
  else if (!('ontouchstart' in window)) player.moveDir = 0;

  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
  </script>
<script src="../header.js"></script>
</body>
</html>
