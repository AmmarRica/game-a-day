<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Day 17 – Bushido Ball</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      overflow: hidden;
      touch-action: none;
    }
    nav { width: 100%; max-width: 480px; margin-bottom: 0.5rem; }
    nav a { color: #a78bfa; text-decoration: none; font-size: 0.9rem; }
    h1 { color: #a78bfa; font-size: 1.5rem; margin-bottom: 0.25rem; }
    #info { color: #9ca3af; font-size: 0.85rem; margin-bottom: 0.5rem; text-align: center; }
    canvas {
      background: #1a1a2e;
      border-radius: 8px;
      border: 1px solid #3b3b5c;
      max-width: 480px;
      width: 100%;
      touch-action: none;
    }
    #score { font-size: 1.2rem; margin-top: 0.5rem; color: #e0e0ff; }
    #overlay {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(15,15,26,0.95); border: 2px solid #a78bfa; border-radius: 12px;
      padding: 2rem; text-align: center; display: none; z-index: 10;
    }
    #overlay h2 { color: #a78bfa; margin-bottom: 1rem; }
    #overlay button {
      background: #a78bfa; color: #0f0f1a; border: none; padding: 0.75rem 2rem;
      border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;
    }
</style>
</head>
<body>
  <h1>Bushido Ball</h1>
  <div id="info">Drag left side to move paddle. Tap right side to slash! First to 7 wins.</div>
  <canvas id="c"></canvas>
  <div id="score">You 0 – 0 CPU</div>
  <div id="overlay"><h2 id="oTitle"></h2><button id="oBtn">Play Again</button></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const overlay = document.getElementById('overlay');
const oTitle = document.getElementById('oTitle');
const oBtn = document.getElementById('oBtn');

const W = 480, H = 640;
canvas.width = W; canvas.height = H;

const PADDLE_W = 80, PADDLE_H = 16;
const BALL_R = 8;
const WIN_SCORE = 7;
const BALL_BASE_SPEED = 5;
const POWER_SPEED = 10;
const AI_SPEED = 4;

let playerScore = 0, cpuScore = 0;
let gameOver = false;
let serving = true;
let serveTimer = 60;

const player = { x: W/2, y: H - 60, w: PADDLE_W, h: PADDLE_H, slashing: 0, slashCooldown: 0 };
const cpu = { x: W/2, y: 60, w: PADDLE_W, h: PADDLE_H, slashing: 0, slashCooldown: 0 };
const ball = { x: W/2, y: H/2, vx: 0, vy: 0, speed: BALL_BASE_SPEED, powered: false, trail: [] };

let particles = [];
let slashEffects = [];
let dragId = null;
let dragStartY = 0;
let playerDragOffset = 0;

function resetBall(towardsPlayer) {
  ball.x = W/2;
  ball.y = H/2;
  const angle = (Math.random() * 0.6 - 0.3);
  ball.speed = BALL_BASE_SPEED;
  ball.vx = Math.sin(angle) * ball.speed;
  ball.vy = (towardsPlayer ? 1 : -1) * Math.cos(angle) * ball.speed;
  ball.powered = false;
  ball.trail = [];
  serving = true;
  serveTimer = 60;
}

function getCanvasPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return { x: (touch.clientX - rect.left) * W / rect.width, y: (touch.clientY - rect.top) * H / rect.height };
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    const pos = getCanvasPos(t);
    if (pos.x < W * 0.55) {
      // Drag zone - move paddle
      dragId = t.identifier;
      dragStartY = pos.y;
      playerDragOffset = player.x - pos.x;
    } else {
      // Slash zone
      doSlash();
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (t.identifier === dragId) {
      const pos = getCanvasPos(t);
      player.x = Math.max(PADDLE_W/2, Math.min(W - PADDLE_W/2, pos.x + playerDragOffset));
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    if (t.identifier === dragId) dragId = null;
  }
}, { passive: false });

// Mouse fallback
let mouseDown = false;
canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const pos = { x: (e.clientX - rect.left) * W / rect.width, y: (e.clientY - rect.top) * H / rect.height };
  if (pos.x < W * 0.55) {
    mouseDown = true;
    playerDragOffset = player.x - pos.x;
  } else {
    doSlash();
  }
});
canvas.addEventListener('mousemove', (e) => {
  if (!mouseDown) return;
  const rect = canvas.getBoundingClientRect();
  const pos = { x: (e.clientX - rect.left) * W / rect.width };
  player.x = Math.max(PADDLE_W/2, Math.min(W - PADDLE_W/2, pos.x + playerDragOffset));
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });

oBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  playerScore = 0; cpuScore = 0; gameOver = false;
  updateScore();
  resetBall(true);
});

function doSlash() {
  if (player.slashCooldown > 0) return;
  player.slashing = 12;
  player.slashCooldown = 30;
  slashEffects.push({
    x: player.x, y: player.y - PADDLE_H, life: 15, maxLife: 15, side: 'player'
  });
}

function cpuSlash() {
  if (cpu.slashCooldown > 0) return;
  cpu.slashing = 12;
  cpu.slashCooldown = 30;
  slashEffects.push({
    x: cpu.x, y: cpu.y + PADDLE_H, life: 15, maxLife: 15, side: 'cpu'
  });
}

function updateScore() {
  scoreEl.textContent = `You ${playerScore} – ${cpuScore} CPU`;
}

function spawnHitParticles(x, y, powered) {
  const color = powered ? '#f59e0b' : '#a78bfa';
  for (let i = 0; i < (powered ? 15 : 8); i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
      life: 20 + Math.random() * 15, maxLife: 35, color, r: 2 + Math.random() * 3
    });
  }
}

function paddleCollision(paddle, isPlayer) {
  const px = paddle.x - paddle.w/2, py = isPlayer ? paddle.y - paddle.h : paddle.y;
  if (ball.x + BALL_R > px && ball.x - BALL_R < px + paddle.w &&
      ball.y + BALL_R > py && ball.y - BALL_R < py + paddle.h) {
    const hitX = (ball.x - paddle.x) / (paddle.w / 2); // -1 to 1
    const angle = hitX * Math.PI / 4; // ±45 degrees

    // Check if paddle is slashing
    const isPowerShot = paddle.slashing > 5;

    if (isPowerShot) {
      ball.speed = POWER_SPEED;
      ball.powered = true;
      spawnHitParticles(ball.x, ball.y, true);
    } else {
      ball.speed = BALL_BASE_SPEED + Math.abs(hitX) * 2;
      ball.powered = false;
      spawnHitParticles(ball.x, ball.y, false);
    }

    ball.vx = Math.sin(angle) * ball.speed;
    ball.vy = (isPlayer ? -1 : 1) * Math.cos(angle) * ball.speed;

    // Push ball out of paddle
    if (isPlayer) ball.y = py - BALL_R;
    else ball.y = py + paddle.h + BALL_R;

    return true;
  }
  return false;
}

function update() {
  if (gameOver) return;

  if (serving) {
    serveTimer--;
    if (serveTimer <= 0) serving = false;
    return;
  }

  // Ball movement
  ball.trail.push({ x: ball.x, y: ball.y, powered: ball.powered });
  if (ball.trail.length > 15) ball.trail.shift();

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounces
  if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx *= -1; }
  if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx *= -1; }

  // Scoring
  if (ball.y < -20) {
    playerScore++;
    updateScore();
    if (playerScore >= WIN_SCORE) {
      gameOver = true;
      oTitle.textContent = 'You Win!';
      overlay.style.display = 'block';
    } else {
      resetBall(false);
    }
  }
  if (ball.y > H + 20) {
    cpuScore++;
    updateScore();
    if (cpuScore >= WIN_SCORE) {
      gameOver = true;
      oTitle.textContent = 'CPU Wins!';
      overlay.style.display = 'block';
    } else {
      resetBall(true);
    }
  }

  // Paddle collisions
  paddleCollision(player, true);
  paddleCollision(cpu, false);

  // Slash cooldowns
  if (player.slashing > 0) player.slashing--;
  if (player.slashCooldown > 0) player.slashCooldown--;
  if (cpu.slashing > 0) cpu.slashing--;
  if (cpu.slashCooldown > 0) cpu.slashCooldown--;

  // AI
  const targetX = ball.vy < 0 ? ball.x + ball.vx * 5 : W/2;
  const dx = targetX - cpu.x;
  if (Math.abs(dx) > 5) {
    cpu.x += Math.sign(dx) * Math.min(AI_SPEED, Math.abs(dx));
  }
  cpu.x = Math.max(PADDLE_W/2, Math.min(W - PADDLE_W/2, cpu.x));

  // AI slash timing
  if (ball.vy < 0 && ball.y < 120 && ball.y > 40 && Math.abs(ball.x - cpu.x) < PADDLE_W) {
    if (Math.random() < 0.15) cpuSlash();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Slash effects
  for (let i = slashEffects.length - 1; i >= 0; i--) {
    slashEffects[i].life--;
    if (slashEffects[i].life <= 0) slashEffects.splice(i, 1);
  }
}

function drawPaddle(p, isPlayer) {
  const py = isPlayer ? p.y - p.h : p.y;

  // Paddle body
  const gradient = ctx.createLinearGradient(p.x - p.w/2, py, p.x + p.w/2, py);
  if (isPlayer) {
    gradient.addColorStop(0, '#4f46e5'); gradient.addColorStop(0.5, '#6366f1'); gradient.addColorStop(1, '#4f46e5');
  } else {
    gradient.addColorStop(0, '#dc2626'); gradient.addColorStop(0.5, '#ef4444'); gradient.addColorStop(1, '#dc2626');
  }
  ctx.fillStyle = gradient;
  ctx.fillRect(p.x - p.w/2, py, p.w, p.h);

  // Sword
  const swordExtend = p.slashing > 0 ? 30 : 15;
  const swordDir = isPlayer ? -1 : 1;
  const swordY = isPlayer ? py - 2 : py + p.h + 2;
  ctx.strokeStyle = p.slashing > 5 ? '#fbbf24' : '#e0e0ff';
  ctx.lineWidth = p.slashing > 5 ? 4 : 2;
  ctx.beginPath();
  ctx.moveTo(p.x - 3, swordY);
  ctx.lineTo(p.x - 3, swordY + swordDir * swordExtend);
  ctx.stroke();
  // Sword tip
  ctx.fillStyle = p.slashing > 5 ? '#fbbf24' : '#e0e0ff';
  ctx.beginPath();
  ctx.moveTo(p.x - 6, swordY + swordDir * swordExtend);
  ctx.lineTo(p.x - 3, swordY + swordDir * (swordExtend + 8));
  ctx.lineTo(p.x, swordY + swordDir * swordExtend);
  ctx.closePath(); ctx.fill();
  // Hilt
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(p.x - 10, swordY - 2, 14, 4);

  // Slash glow
  if (p.slashing > 5) {
    ctx.fillStyle = `rgba(251,191,36,${p.slashing / 20})`;
    ctx.beginPath();
    ctx.arc(p.x, swordY + swordDir * swordExtend/2, 25, 0, Math.PI * 2);
    ctx.fill();
  }

  // Cooldown indicator
  if (p.slashCooldown > 0 && isPlayer) {
    ctx.fillStyle = '#333';
    ctx.fillRect(p.x - p.w/2, py + p.h + 5, p.w, 4);
    ctx.fillStyle = '#a78bfa';
    ctx.fillRect(p.x - p.w/2, py + p.h + 5, p.w * (1 - p.slashCooldown / 30), 4);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a0a'); grad.addColorStop(0.5, '#0f0f1a'); grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Court lines
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
  ctx.setLineDash([]);

  // Side lines
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 3;
  ctx.strokeRect(10, 10, W - 20, H - 20);

  // Japanese-style decorations
  ctx.fillStyle = '#1a1a3e';
  ctx.font = '60px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.1;
  ctx.fillText('武', W/2, H/2);
  ctx.globalAlpha = 1;

  // Ball trail
  for (let i = 0; i < ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = i / ball.trail.length * 0.5;
    const r = BALL_R * (i / ball.trail.length);
    ctx.fillStyle = t.powered ? `rgba(251,191,36,${alpha})` : `rgba(167,139,250,${alpha})`;
    ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI * 2); ctx.fill();
  }

  // Ball
  if (ball.powered) {
    ctx.fillStyle = 'rgba(251,191,36,0.3)';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R + 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fbbf24';
  } else {
    ctx.fillStyle = '#e0e0ff';
  }
  ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = ball.powered ? '#f59e0b' : '#a78bfa';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Slash effects
  for (let s of slashEffects) {
    const t = s.life / s.maxLife;
    ctx.strokeStyle = `rgba(251,191,36,${t})`;
    ctx.lineWidth = 3 * t;
    const radius = 30 * (1 - t) + 10;
    ctx.beginPath();
    ctx.arc(s.x, s.y, radius, -Math.PI * 0.3, Math.PI * 0.3);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(s.x, s.y, radius * 0.7, Math.PI * 0.7, Math.PI * 1.3);
    ctx.stroke();
  }

  // Paddles
  drawPaddle(player, true);
  drawPaddle(cpu, false);

  // Particles
  for (let p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Score display
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W/2 - 60, H/2 - 18, 120, 36);
  ctx.font = 'bold 24px system-ui';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#6366f1';
  ctx.fillText(`${playerScore}`, W/2 - 25, H/2);
  ctx.fillStyle = '#555';
  ctx.fillText(':', W/2, H/2);
  ctx.fillStyle = '#ef4444';
  ctx.fillText(`${cpuScore}`, W/2 + 25, H/2);

  // Serve countdown
  if (serving && serveTimer > 0) {
    ctx.fillStyle = '#a78bfa';
    ctx.font = 'bold 48px system-ui';
    ctx.fillText(Math.ceil(serveTimer / 20).toString(), W/2, H/2 + 60);
  }

  // Tap to slash hint
  ctx.fillStyle = 'rgba(167,139,250,0.12)';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText('TAP RIGHT TO SLASH', W - 15, H - 20);
  ctx.textAlign = 'left';
  ctx.fillText('DRAG LEFT TO MOVE', 15, H - 20);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

resetBall(true);
gameLoop();
</script>
<script src="../header.js"></script>
</body>
</html>
