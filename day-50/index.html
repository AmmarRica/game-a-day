<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Day 50 – Quibble Race</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    nav { width: 100%; max-width: 480px; margin-bottom: 1rem; }
    nav a { color: #a78bfa; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.8rem; color: #a78bfa; margin-bottom: 0.25rem; }
    p.subtitle { color: #9ca3af; margin-bottom: 1rem; font-size: 0.9rem; }
    canvas { border: 2px solid #3b3b5c; border-radius: 8px; background: #1e1e2e; max-width: 480px; width: 100%; }
    #hint { color: #9ca3af; font-size: 0.8rem; text-align: center; margin-top: 0.5rem; max-width: 480px; }
</style>
</head>
<body>
  <h1>Quibble Race</h1>
  <p class="subtitle">Day 50 – Creature Racing</p>
  <canvas id="gc"></canvas>
  <div id="hint">Tap rapidly to run! Swipe left/right to dodge obstacles.</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;
canvas.width = W; canvas.height = H;

const LANES = 5;
const LANE_W = W / LANES;
const TRACK_LEN = 3000; // pixels per lap
const TOTAL_LAPS = 3;

let state = 'ready'; // ready, racing, finished
let player = { lane: 2, y: H * 0.75, speed: 0, energy: 50, maxEnergy: 100, distance: 0, lap: 0, boost: 0, shieldTimer: 0 };
let aiRacers = [];
let obstacles = [];
let powerups = [];
let particles = [];
let tapCount = 0;
let tapDecay = 0;
let swipeStartX = 0, swipeStartY = 0;
let trackOffset = 0;
let finishOrder = [];
let countdownTimer = 0;
let raceTime = 0;

const CREATURE_COLORS = ['#a78bfa', '#f472b6', '#34d399', '#fbbf24'];
const CREATURE_NAMES = ['You', 'Gribble', 'Snorf', 'Plimbo'];

function init() {
  player = { lane: 2, y: H * 0.75, speed: 0, energy: 50, maxEnergy: 100, distance: 0, lap: 0, boost: 0, shieldTimer: 0 };
  aiRacers = [];
  for (let i = 0; i < 3; i++) {
    aiRacers.push({
      lane: i < 2 ? i : i + 1, // skip player lane
      y: H * 0.75 + (i + 1) * 30,
      speed: 0, distance: 0, lap: 0,
      baseSpeed: 2.2 + Math.random() * 0.8,
      color: CREATURE_COLORS[i + 1],
      name: CREATURE_NAMES[i + 1],
      targetLane: i < 2 ? i : i + 1,
      finished: false
    });
  }
  obstacles = [];
  powerups = [];
  particles = [];
  finishOrder = [];
  tapCount = 0;
  tapDecay = 0;
  trackOffset = 0;
  raceTime = 0;
  generateTrackElements();
}

function generateTrackElements() {
  obstacles = [];
  powerups = [];
  const totalDist = TRACK_LEN * TOTAL_LAPS;
  for (let d = 200; d < totalDist; d += 80 + Math.random() * 120) {
    const lane = Math.floor(Math.random() * LANES);
    obstacles.push({ dist: d, lane, type: Math.random() < 0.3 ? 'rock' : 'puddle' });
  }
  for (let d = 300; d < totalDist; d += 200 + Math.random() * 300) {
    const lane = Math.floor(Math.random() * LANES);
    const type = Math.random() < 0.5 ? 'speed' : 'shield';
    powerups.push({ dist: d, lane, type, collected: false });
  }
}

function drawCreature(x, y, color, speed, name, isPlayer) {
  const bounce = Math.sin(Date.now() * (0.01 * Math.max(1, speed))) * 3;
  const lean = speed * 0.5;
  // body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(x, y + bounce, 18, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 7, y - 6 + bounce, 6, 0, Math.PI * 2);
  ctx.arc(x + 7, y - 6 + bounce, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x - 5 + lean * 0.3, y - 6 + bounce, 3, 0, Math.PI * 2);
  ctx.arc(x + 9 + lean * 0.3, y - 6 + bounce, 3, 0, Math.PI * 2);
  ctx.fill();
  // legs animation
  const legPhase = Date.now() * 0.015 * Math.max(0.5, speed);
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  for (let i = -1; i <= 1; i += 2) {
    ctx.beginPath();
    ctx.moveTo(x + i * 10, y + 16 + bounce);
    ctx.lineTo(x + i * 10 + Math.sin(legPhase + i) * 8, y + 28 + bounce);
    ctx.stroke();
  }
  // name tag
  ctx.fillStyle = '#e0e0ff';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText(name, x, y - 30 + bounce);

  // shield effect
  if (isPlayer && player.shieldTimer > 0) {
    ctx.strokeStyle = '#34d399';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.01) * 0.3;
    ctx.beginPath();
    ctx.arc(x, y + bounce, 28, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawTrack() {
  // background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a2a1a');
  grad.addColorStop(1, '#1e1e2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // lane lines
  for (let i = 0; i <= LANES; i++) {
    ctx.strokeStyle = '#3b3b5c';
    ctx.lineWidth = i === 0 || i === LANES ? 3 : 1;
    ctx.setLineDash(i === 0 || i === LANES ? [] : [10, 10]);
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // track markers
  for (let y = -trackOffset % 80; y < H; y += 80) {
    ctx.fillStyle = '#3b3b5c44';
    ctx.fillRect(0, y, W, 2);
  }

  // finish line
  const totalDist = TRACK_LEN * TOTAL_LAPS;
  const finishY = player.y - (totalDist - player.distance);
  if (finishY > -50 && finishY < H + 50) {
    for (let x = 0; x < W; x += 20) {
      ctx.fillStyle = ((x / 20) % 2 === 0) ? '#fff' : '#111';
      ctx.fillRect(x, finishY, 20, 10);
      ctx.fillStyle = ((x / 20) % 2 === 0) ? '#111' : '#fff';
      ctx.fillRect(x, finishY + 10, 20, 10);
    }
  }

  // lap markers
  for (let lap = 1; lap <= TOTAL_LAPS; lap++) {
    const markerDist = TRACK_LEN * lap;
    const my = player.y - (markerDist - player.distance);
    if (my > -30 && my < H + 30) {
      ctx.fillStyle = '#a78bfa';
      ctx.font = 'bold 14px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(`--- LAP ${lap} ---`, W/2, my);
    }
  }
}

function drawObstacles() {
  obstacles.forEach(o => {
    const dy = player.y - (o.dist - player.distance);
    if (dy < -50 || dy > H + 50) return;
    const x = o.lane * LANE_W + LANE_W / 2;
    if (o.type === 'rock') {
      ctx.fillStyle = '#6b7280';
      ctx.beginPath();
      ctx.moveTo(x - 15, dy + 10); ctx.lineTo(x - 5, dy - 12);
      ctx.lineTo(x + 8, dy - 8); ctx.lineTo(x + 15, dy + 10);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4b5563';
      ctx.beginPath();
      ctx.moveTo(x - 5, dy - 12); ctx.lineTo(x + 2, dy - 5);
      ctx.lineTo(x + 8, dy - 8);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle = '#3b82f644';
      ctx.beginPath();
      ctx.ellipse(x, dy, 18, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#3b82f688';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  });
}

function drawPowerups() {
  powerups.forEach(p => {
    if (p.collected) return;
    const dy = player.y - (p.dist - player.distance);
    if (dy < -50 || dy > H + 50) return;
    const x = p.lane * LANE_W + LANE_W / 2;
    const bob = Math.sin(Date.now() * 0.005 + p.dist) * 4;
    ctx.fillStyle = p.type === 'speed' ? '#fbbf24' : '#34d399';
    ctx.beginPath();
    ctx.arc(x, dy + bob, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(p.type === 'speed' ? 'S' : 'D', x, dy + bob + 4);
  });
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 20+Math.random()*15, color, r: 2+Math.random()*3 });
  }
}

function update() {
  if (state === 'ready') {
    countdownTimer++;
    if (countdownTimer > 180) { state = 'racing'; countdownTimer = 0; }
    draw();
    requestAnimationFrame(update);
    return;
  }

  if (state === 'finished') {
    draw();
    requestAnimationFrame(update);
    return;
  }

  raceTime++;

  // decay taps
  tapDecay++;
  if (tapDecay > 8) { tapCount = Math.max(0, tapCount - 1); tapDecay = 0; }

  // player speed from taps
  const targetSpeed = Math.min(6, tapCount * 0.8);
  player.speed += (targetSpeed - player.speed) * 0.1;
  if (player.boost > 0) { player.speed = 8; player.boost--; }
  player.distance += player.speed;
  trackOffset += player.speed;

  // energy
  if (player.speed > 3) player.energy = Math.max(0, player.energy - 0.15);
  else player.energy = Math.min(player.maxEnergy, player.energy + 0.3);
  if (player.energy <= 0) { player.speed *= 0.9; tapCount = Math.max(0, tapCount - 2); }

  // lap check
  const newLap = Math.floor(player.distance / TRACK_LEN);
  if (newLap > player.lap && player.lap < TOTAL_LAPS) {
    player.lap = Math.min(newLap, TOTAL_LAPS);
  }
  if (player.distance >= TRACK_LEN * TOTAL_LAPS && !finishOrder.includes('You')) {
    finishOrder.push('You');
    if (finishOrder.length >= 4 || finishOrder.length >= 1) checkFinish();
  }

  // shield timer
  if (player.shieldTimer > 0) player.shieldTimer--;

  // collision with obstacles
  obstacles.forEach(o => {
    const dy = Math.abs(o.dist - player.distance);
    if (dy < 20 && o.lane === player.lane) {
      if (player.shieldTimer > 0) {
        spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#34d399', 10);
        return;
      }
      if (o.type === 'rock') {
        player.speed = Math.max(0, player.speed - 3);
        tapCount = Math.max(0, tapCount - 3);
        spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#ef4444', 8);
      } else {
        player.speed *= 0.5;
        spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#3b82f6', 5);
      }
    }
  });

  // powerup collection
  powerups.forEach(p => {
    if (p.collected) return;
    if (Math.abs(p.dist - player.distance) < 25 && p.lane === player.lane) {
      p.collected = true;
      if (p.type === 'speed') {
        player.boost = 60;
        spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#fbbf24', 12);
      } else {
        player.shieldTimer = 300;
        spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#34d399', 12);
      }
    }
  });

  // AI racers
  aiRacers.forEach(ai => {
    if (ai.finished) return;
    // speed variation
    ai.speed += (ai.baseSpeed + Math.sin(raceTime * 0.02 + ai.lane) * 0.5 - ai.speed) * 0.05;
    ai.distance += ai.speed;

    // dodge obstacles
    if (raceTime % 30 === 0) {
      const ahead = obstacles.find(o => o.dist > ai.distance && o.dist < ai.distance + 150 && o.lane === ai.lane);
      if (ahead) {
        ai.targetLane = ai.lane + (Math.random() < 0.5 ? -1 : 1);
        ai.targetLane = Math.max(0, Math.min(LANES-1, ai.targetLane));
      }
    }
    if (ai.lane !== ai.targetLane) {
      ai.lane += Math.sign(ai.targetLane - ai.lane) * 0.05;
      if (Math.abs(ai.lane - ai.targetLane) < 0.1) ai.lane = ai.targetLane;
    }

    const aiLap = Math.floor(ai.distance / TRACK_LEN);
    if (ai.distance >= TRACK_LEN * TOTAL_LAPS && !ai.finished) {
      ai.finished = true;
      if (!finishOrder.includes(ai.name)) finishOrder.push(ai.name);
      checkFinish();
    }
  });

  // particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; p.vy += 0.1; });
  particles = particles.filter(p => p.life > 0);

  draw();
  requestAnimationFrame(update);
}

function checkFinish() {
  if (finishOrder.length >= 4) state = 'finished';
  if (finishOrder.includes('You')) state = 'finished';
}

function draw() {
  drawTrack();
  drawObstacles();
  drawPowerups();

  // draw AI racers
  aiRacers.forEach(ai => {
    if (ai.finished) return;
    const relDist = ai.distance - player.distance;
    const ay = player.y - relDist;
    if (ay > -50 && ay < H + 50) {
      drawCreature(ai.lane * LANE_W + LANE_W/2, ay, ai.color, ai.speed, ai.name, false);
    }
  });

  // draw player
  drawCreature(player.lane * LANE_W + LANE_W/2, player.y, CREATURE_COLORS[0], player.speed, 'You', true);

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 35;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#0f0f1aDD';
  ctx.fillRect(0, 0, W, 55);
  ctx.fillStyle = '#e0e0ff';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(`Lap ${Math.min(player.lap + 1, TOTAL_LAPS)}/${TOTAL_LAPS}`, 10, 18);
  ctx.fillText(`Speed: ${player.speed.toFixed(1)}`, 10, 38);

  // energy bar
  ctx.fillStyle = '#333';
  ctx.fillRect(150, 8, 120, 12);
  ctx.fillStyle = player.energy > 25 ? '#a78bfa' : '#ef4444';
  ctx.fillRect(150, 8, 120 * (player.energy / player.maxEnergy), 12);
  ctx.fillStyle = '#e0e0ff';
  ctx.font = '10px system-ui';
  ctx.fillText('Energy', 155, 17);

  // position
  let pos = 1;
  aiRacers.forEach(ai => { if (ai.distance > player.distance) pos++; });
  ctx.font = 'bold 20px system-ui';
  ctx.textAlign = 'right';
  ctx.fillStyle = pos === 1 ? '#fbbf24' : '#e0e0ff';
  ctx.fillText(`${pos}${pos===1?'st':pos===2?'nd':pos===3?'rd':'th'}`, W - 10, 22);

  const time = (raceTime / 60).toFixed(1);
  ctx.font = '12px system-ui';
  ctx.fillStyle = '#9ca3af';
  ctx.fillText(`${time}s`, W - 10, 42);

  // tap indicator
  ctx.fillStyle = '#a78bfa';
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < Math.min(tapCount, 8); i++) {
    ctx.beginPath();
    ctx.arc(W/2 - 60 + i * 18, H - 20, 6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // countdown
  if (state === 'ready') {
    ctx.fillStyle = '#0f0f1a99';
    ctx.fillRect(0, 0, W, H);
    const sec = 3 - Math.floor(countdownTimer / 60);
    ctx.fillStyle = sec > 0 ? '#a78bfa' : '#4ade80';
    ctx.font = 'bold 72px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(sec > 0 ? sec : 'GO!', W/2, H/2);
    ctx.font = '16px system-ui';
    ctx.fillStyle = '#9ca3af';
    ctx.fillText('Tap rapidly to run, swipe to dodge', W/2, H/2 + 50);
  }

  // finish screen
  if (state === 'finished') {
    ctx.fillStyle = '#0f0f1aBB';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#a78bfa';
    ctx.font = 'bold 36px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('RACE OVER!', W/2, H/3);

    const playerPos = finishOrder.indexOf('You') + 1;
    ctx.fillStyle = playerPos === 1 ? '#fbbf24' : playerPos <= 2 ? '#c0c0c0' : '#e0e0ff';
    ctx.font = 'bold 28px system-ui';
    ctx.fillText(playerPos === 1 ? 'YOU WIN!' : `You placed ${playerPos}${playerPos===2?'nd':playerPos===3?'rd':'th'}`, W/2, H/3 + 50);

    ctx.font = '18px system-ui';
    ctx.fillStyle = '#e0e0ff';
    finishOrder.forEach((name, i) => {
      ctx.fillText(`${i+1}. ${name}`, W/2, H/3 + 100 + i * 30);
    });

    ctx.fillStyle = '#9ca3af';
    ctx.font = '14px system-ui';
    ctx.fillText(`Time: ${(raceTime/60).toFixed(1)}s - Tap to restart`, W/2, H/3 + 240);
  }
}

// Touch controls
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'finished') { init(); state = 'ready'; countdownTimer = 0; return; }
  if (state !== 'racing') return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  swipeStartX = t.clientX;
  swipeStartY = t.clientY;
  tapCount = Math.min(10, tapCount + 1);
  tapDecay = 0;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (state !== 'racing') return;
  if (e.changedTouches.length > 0) {
    const t = e.changedTouches[0];
    const dx = t.clientX - swipeStartX;
    const dy = t.clientY - swipeStartY;
    if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
      if (dx < 0 && player.lane > 0) { player.lane--; spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#a78bfa', 5); }
      if (dx > 0 && player.lane < LANES - 1) { player.lane++; spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#a78bfa', 5); }
    }
  }
});

// Mouse fallback
canvas.addEventListener('mousedown', e => {
  if (state === 'finished') { init(); state = 'ready'; countdownTimer = 0; return; }
  if (state !== 'racing') return;
  swipeStartX = e.clientX;
  tapCount = Math.min(10, tapCount + 1);
  tapDecay = 0;
});

canvas.addEventListener('mouseup', e => {
  if (state !== 'racing') return;
  const dx = e.clientX - swipeStartX;
  if (Math.abs(dx) > 30) {
    if (dx < 0 && player.lane > 0) { player.lane--; spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#a78bfa', 5); }
    if (dx > 0 && player.lane < LANES - 1) { player.lane++; spawnParticles(player.lane * LANE_W + LANE_W/2, player.y, '#a78bfa', 5); }
  }
});

// Keyboard fallback
document.addEventListener('keydown', e => {
  if (state === 'finished') { init(); state = 'ready'; countdownTimer = 0; return; }
  if (state !== 'racing') return;
  if (e.key === ' ' || e.key === 'ArrowUp') { tapCount = Math.min(10, tapCount + 1); tapDecay = 0; }
  if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
  if (e.key === 'ArrowRight' && player.lane < LANES - 1) player.lane++;
});

init();
update();
</script>
<script src="../header.js"></script>
</body>
</html>
