<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Day 04 – Charlotte Monster Rampage</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e2e2e2;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  a { color: #a78bfa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  nav { width: 100%; max-width: 700px; margin-bottom: 1rem; }
  h1 { font-size: 1.6rem; margin-bottom: .25rem; }
  .subtitle { color: #888; margin-bottom: 1rem; font-size: .95rem; }
  canvas {
    border: 2px solid #a78bfa;
    background: #1a1a2e;
    display: block;
    image-rendering: pixelated;
  }
  .controls {
    margin-top: 1rem;
    color: #888;
    font-size: .85rem;
    text-align: center;
    line-height: 1.6;
    max-width: 700px;
  }
  .controls kbd {
    background: #2a2a3e;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: inherit;
    color: #a78bfa;
  }
</style>
</head>
<body>
<nav><a href="../">← Back to Gallery</a></nav>
<h1>Day 04</h1>
<p class="subtitle">Charlotte Monster Rampage</p>
<canvas id="game" width="700" height="460"></canvas>
<div class="controls">
  <kbd>←</kbd> <kbd>→</kbd> Move &nbsp;|&nbsp;
  <kbd>Space</kbd> Smash &nbsp;|&nbsp;
  <kbd>R</kbd> Restart
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Game State ──────────────────────────────────────────
let monster, buildings, projectiles, helicopters, particles, explosions;
let score, combo, shakeTimer, shakeIntensity, gameOver, gameWon;
let groundY = H - 40;
let keys = {};
let frameCount = 0;

function init() {
  score = 0;
  combo = 0;
  shakeTimer = 0;
  shakeIntensity = 0;
  gameOver = false;
  gameWon = false;
  frameCount = 0;
  particles = [];
  explosions = [];
  projectiles = [];
  helicopters = [];

  monster = {
    x: 60, y: groundY,
    w: 50, h: 70,
    vx: 0,
    hp: 100,
    maxHp: 100,
    facing: 1,
    smashing: false,
    smashTimer: 0,
    smashCooldown: 0,
    walkFrame: 0,
    hitFlash: 0,
  };

  // Charlotte skyline buildings
  buildings = [
    { name: 'Bank of America', x: 140, w: 55, floors: 12, color: '#4a6fa5', accent: '#5a8fc5', hp: 50, maxHp: 50 },
    { name: 'Duke Energy',     x: 210, w: 45, floors: 10, color: '#5a7a5a', accent: '#6a9a6a', hp: 40, maxHp: 40 },
    { name: 'Hearst Tower',    x: 270, w: 50, floors: 9,  color: '#7a6a5a', accent: '#9a8a7a', hp: 35, maxHp: 35 },
    { name: 'NASCAR Hall',     x: 340, w: 60, floors: 5,  color: '#8a4a4a', accent: '#aa6a6a', hp: 25, maxHp: 25 },
    { name: 'Truist Center',   x: 420, w: 45, floors: 8,  color: '#5a5a8a', accent: '#7a7aaa', hp: 30, maxHp: 30 },
    { name: 'Capitol Tower',   x: 480, w: 48, floors: 7,  color: '#6a5a7a', accent: '#8a7a9a', hp: 28, maxHp: 28 },
    { name: '300 South Tryon', x: 545, w: 42, floors: 11, color: '#4a7a8a', accent: '#6a9aaa', hp: 45, maxHp: 45 },
    { name: 'Ally Center',     x: 605, w: 50, floors: 6,  color: '#7a7a5a', accent: '#9a9a7a', hp: 22, maxHp: 22 },
  ];

  buildings.forEach(b => {
    b.floorH = 14;
    b.fullH = b.floors * b.floorH;
    b.y = groundY - b.fullH;
    b.debris = [];
    b.destroyed = false;
    b.windowBlink = Math.random() * 100;
  });
}

// ── Input ───────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyR') init();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Particles ───────────────────────────────────────────
function spawnDebris(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 6 - 2,
      size: Math.random() * 5 + 2,
      color,
      life: 60 + Math.random() * 40,
      gravity: 0.15,
    });
  }
}

function spawnExplosion(x, y) {
  explosions.push({ x, y, radius: 5, maxRadius: 35, life: 20 });
  for (let i = 0; i < 15; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: Math.random() * 4 + 1,
      color: ['#ff6644', '#ffaa22', '#ffdd44', '#ffffff'][Math.floor(Math.random() * 4)],
      life: 25 + Math.random() * 15,
      gravity: 0.05,
    });
  }
}

function spawnSmoke(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 20,
      y,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -Math.random() * 1.5 - 0.5,
      size: Math.random() * 8 + 4,
      color: `rgba(100,100,100,${Math.random() * 0.4 + 0.1})`,
      life: 40 + Math.random() * 30,
      gravity: -0.02,
      isSmoke: true,
    });
  }
}

// ── Helicopters ─────────────────────────────────────────
function spawnHelicopter() {
  if (helicopters.length >= 3) return;
  const fromRight = Math.random() > 0.5;
  helicopters.push({
    x: fromRight ? W + 30 : -30,
    y: 40 + Math.random() * 80,
    vx: fromRight ? -1.2 : 1.2,
    shootTimer: 60 + Math.random() * 60,
    hp: 2,
  });
}

// ── Update ──────────────────────────────────────────────
function update() {
  if (gameOver || gameWon) return;
  frameCount++;

  // Monster movement
  const speed = 2.5;
  if (keys['ArrowLeft']) { monster.vx = -speed; monster.facing = -1; }
  else if (keys['ArrowRight']) { monster.vx = speed; monster.facing = 1; }
  else { monster.vx *= 0.7; }
  monster.x += monster.vx;
  monster.x = Math.max(20, Math.min(W - 20, monster.x));
  monster.walkFrame += Math.abs(monster.vx) * 0.1;

  // Smash
  if (monster.smashCooldown > 0) monster.smashCooldown--;
  if (keys['Space'] && !monster.smashing && monster.smashCooldown <= 0) {
    monster.smashing = true;
    monster.smashTimer = 15;
    monster.smashCooldown = 25;
  }
  if (monster.smashing) {
    monster.smashTimer--;
    if (monster.smashTimer <= 0) monster.smashing = false;

    // Check building hits at peak of smash (frame 10)
    if (monster.smashTimer === 10) {
      const smashX = monster.x + monster.facing * 35;
      const smashY = monster.y - monster.h / 2;
      let hitAny = false;

      buildings.forEach(b => {
        if (b.destroyed) return;
        if (smashX > b.x && smashX < b.x + b.w && smashY > b.y - 10 && smashY < groundY) {
          const dmg = 8 + Math.floor(Math.random() * 5);
          b.hp -= dmg;
          hitAny = true;

          // Debris
          spawnDebris(smashX, smashY, b.accent, 8);
          shakeTimer = 8;
          shakeIntensity = 4;

          // Remove top floors visually
          const pct = Math.max(0, b.hp / b.maxHp);
          const newFloors = Math.ceil(b.floors * pct);
          b.fullH = newFloors * b.floorH;
          b.y = groundY - b.fullH;

          if (b.hp <= 0) {
            b.destroyed = true;
            b.hp = 0;
            combo++;
            const pts = 100 * combo;
            score += pts;
            spawnExplosion(b.x + b.w / 2, groundY - 30);
            shakeTimer = 15;
            shakeIntensity = 8;

            // Big debris cloud
            for (let i = 0; i < 20; i++) {
              spawnDebris(b.x + Math.random() * b.w, groundY - Math.random() * 40, b.color, 3);
            }
          } else {
            score += 10;
            spawnSmoke(b.x + b.w / 2, b.y);
          }
        }
      });

      if (!hitAny) combo = 0;
    }
  }

  // Hit flash
  if (monster.hitFlash > 0) monster.hitFlash--;

  // Helicopters
  if (frameCount % 180 === 0 && Math.random() > 0.3) spawnHelicopter();

  helicopters.forEach(h => {
    h.x += h.vx;
    h.y += Math.sin(frameCount * 0.03 + h.x) * 0.3;
    h.shootTimer--;
    if (h.shootTimer <= 0) {
      h.shootTimer = 80 + Math.random() * 40;
      const dx = monster.x - h.x, dy = (monster.y - 30) - h.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      projectiles.push({
        x: h.x, y: h.y,
        vx: (dx / dist) * 3.5,
        vy: (dy / dist) * 3.5,
        type: 'bullet',
        life: 120,
      });
    }
  });
  helicopters = helicopters.filter(h => h.x > -60 && h.x < W + 60 && h.hp > 0);

  // Monster smash can hit helicopters
  if (monster.smashing && monster.smashTimer === 10) {
    const smashX = monster.x + monster.facing * 35;
    const smashY = monster.y - monster.h;
    helicopters.forEach(h => {
      const dx = h.x - smashX, dy = h.y - smashY;
      if (Math.sqrt(dx * dx + dy * dy) < 50) {
        h.hp = 0;
        score += 50;
        spawnExplosion(h.x, h.y);
      }
    });
  }

  // Projectiles
  projectiles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    // Hit monster
    if (Math.abs(p.x - monster.x) < 20 && Math.abs(p.y - (monster.y - 35)) < 35) {
      p.life = 0;
      monster.hp -= 3;
      monster.hitFlash = 6;
      shakeTimer = 3;
      shakeIntensity = 2;
      if (monster.hp <= 0) {
        gameOver = true;
        spawnExplosion(monster.x, monster.y - 30);
      }
    }
  });
  projectiles = projectiles.filter(p => p.life > 0);

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life--;
    if (p.isSmoke) p.size += 0.2;
  });
  particles = particles.filter(p => p.life > 0);

  // Explosions
  explosions.forEach(e => {
    e.radius += (e.maxRadius - e.radius) * 0.2;
    e.life--;
  });
  explosions = explosions.filter(e => e.life > 0);

  // Shake
  if (shakeTimer > 0) shakeTimer--;

  // Win condition
  if (buildings.every(b => b.destroyed)) gameWon = true;
}

// ── Draw ────────────────────────────────────────────────
function drawMonster() {
  const m = monster;
  const cx = m.x, baseY = m.y;
  const flash = m.hitFlash > 0 && m.hitFlash % 2 === 0;

  ctx.save();
  ctx.translate(cx, baseY);

  // Smash animation lean
  if (m.smashing) {
    const t = m.smashTimer / 15;
    ctx.rotate(m.facing * (1 - t) * 0.3);
  }

  const bodyColor = flash ? '#ffffff' : '#2d8a4e';
  const bellyColor = flash ? '#dddddd' : '#5ab87a';
  const darkGreen = flash ? '#cccccc' : '#1a6634';

  // Tail
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.moveTo(-m.facing * 15, -10);
  ctx.quadraticCurveTo(-m.facing * 40, -15, -m.facing * 55, -5 + Math.sin(frameCount * 0.1) * 3);
  ctx.quadraticCurveTo(-m.facing * 40, -5, -m.facing * 15, -5);
  ctx.fill();

  // Legs
  const legOffset = Math.sin(m.walkFrame) * 4;
  ctx.fillStyle = darkGreen;
  ctx.fillRect(-12, -14 + legOffset, 10, 14);
  ctx.fillRect(4, -14 - legOffset, 10, 14);

  // Feet
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-15, -3 + legOffset, 14, 5);
  ctx.fillRect(3, -3 - legOffset, 14, 5);

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, -35, 18, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = bellyColor;
  ctx.beginPath();
  ctx.ellipse(m.facing * 2, -30, 10, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Back spines
  ctx.fillStyle = flash ? '#eeeeee' : '#1a9944';
  for (let i = 0; i < 5; i++) {
    const sy = -45 - i * 3;
    const sx = -m.facing * (2 + i * 1);
    ctx.beginPath();
    ctx.moveTo(sx - 3, sy + 5);
    ctx.lineTo(sx, sy - 4 - Math.sin(frameCount * 0.08 + i) * 2);
    ctx.lineTo(sx + 3, sy + 5);
    ctx.fill();
  }

  // Arms
  ctx.fillStyle = bodyColor;
  const armAngle = m.smashing ? m.facing * -1.2 : m.facing * -0.3;
  ctx.save();
  ctx.translate(m.facing * 12, -40);
  ctx.rotate(armAngle);
  ctx.fillRect(-3, 0, 7, 18);
  // Claw
  ctx.fillStyle = flash ? '#dddddd' : '#ffcc44';
  ctx.fillRect(-2, 17, 3, 5);
  ctx.fillRect(2, 17, 3, 5);
  ctx.fillRect(5, 16, 3, 4);
  ctx.restore();

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(m.facing * 5, -60, 14, 12, m.facing * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Jaw
  const jawOpen = m.smashing ? 5 : 1;
  ctx.fillStyle = darkGreen;
  ctx.beginPath();
  ctx.ellipse(m.facing * 12, -54 + jawOpen, 9, 5 + jawOpen, m.facing * 0.2, 0, Math.PI);
  ctx.fill();

  // Mouth interior
  ctx.fillStyle = '#cc3333';
  ctx.beginPath();
  ctx.ellipse(m.facing * 12, -53 + jawOpen, 6, 3 + jawOpen * 0.5, m.facing * 0.2, 0, Math.PI);
  ctx.fill();

  // Teeth
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(m.facing * (6 + i * 3), -55, 2, 3);
  }

  // Eye
  ctx.fillStyle = '#ffdd00';
  ctx.beginPath();
  ctx.arc(m.facing * 8, -64, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(m.facing * 9, -64, 2, 0, Math.PI * 2);
  ctx.fill();

  // Fire breath when smashing
  if (m.smashing && m.smashTimer > 5) {
    ctx.globalAlpha = m.smashTimer / 15;
    const fireLen = (15 - m.smashTimer) * 6;
    const grad = ctx.createLinearGradient(m.facing * 20, -55, m.facing * (20 + fireLen), -55);
    grad.addColorStop(0, '#ffaa00');
    grad.addColorStop(0.4, '#ff5500');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(m.facing * 18, -58);
    ctx.lineTo(m.facing * (20 + fireLen), -55 + Math.sin(frameCount * 0.3) * 5);
    ctx.lineTo(m.facing * 18, -50);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawBuilding(b) {
  if (b.destroyed) {
    // Rubble pile
    ctx.fillStyle = b.color;
    for (let i = 0; i < 6; i++) {
      const rx = b.x + i * (b.w / 6);
      const rh = 5 + Math.sin(i * 2.1) * 4;
      ctx.fillRect(rx, groundY - rh, b.w / 6 - 1, rh);
    }
    ctx.fillStyle = '#666';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('DESTROYED', b.x + b.w / 2, groundY - 14);
    return;
  }

  // Building body
  ctx.fillStyle = b.color;
  ctx.fillRect(b.x, b.y, b.w, b.fullH);

  // Side shading
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(b.x + b.w - 6, b.y, 6, b.fullH);

  // Windows
  const cols = Math.floor(b.w / 12);
  const currentFloors = Math.ceil(b.floors * (b.hp / b.maxHp));
  for (let fy = 0; fy < currentFloors; fy++) {
    for (let fx = 0; fx < cols; fx++) {
      const wx = b.x + 4 + fx * 12;
      const wy = b.y + 4 + fy * b.floorH;
      const lit = Math.sin(b.windowBlink + fx * 3 + fy * 7 + frameCount * 0.02) > 0;
      ctx.fillStyle = lit ? '#ffeeaa' : '#223';
      ctx.fillRect(wx, wy, 6, 8);
    }
  }

  // Damage cracks
  if (b.hp < b.maxHp * 0.7) {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const crackY = b.y + b.fullH * 0.3;
    ctx.moveTo(b.x + b.w * 0.3, crackY);
    ctx.lineTo(b.x + b.w * 0.5, crackY + 10);
    ctx.lineTo(b.x + b.w * 0.4, crackY + 25);
    ctx.stroke();
  }
  if (b.hp < b.maxHp * 0.4) {
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const crackY = b.y + b.fullH * 0.5;
    ctx.moveTo(b.x + b.w * 0.7, crackY);
    ctx.lineTo(b.x + b.w * 0.6, crackY + 15);
    ctx.lineTo(b.x + b.w * 0.7, crackY + 30);
    ctx.stroke();
  }

  // HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(b.x, b.y - 10, b.w, 6);
  const hpPct = b.hp / b.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#ccaa22' : '#cc3333';
  ctx.fillRect(b.x + 1, b.y - 9, (b.w - 2) * hpPct, 4);

  // Name
  ctx.fillStyle = '#aaa';
  ctx.font = '7px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, b.x + b.w / 2, b.y - 13);
}

function drawHelicopter(h) {
  ctx.fillStyle = '#556';
  // Body
  ctx.beginPath();
  ctx.ellipse(h.x, h.y, 14, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tail
  ctx.fillRect(h.x + (h.vx > 0 ? -24 : 10), h.y - 2, 14, 4);
  // Rotor
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  const rotorLen = 18 * Math.cos(frameCount * 0.6);
  ctx.beginPath();
  ctx.moveTo(h.x - rotorLen, h.y - 9);
  ctx.lineTo(h.x + rotorLen, h.y - 9);
  ctx.stroke();
  // Rotor post
  ctx.fillStyle = '#888';
  ctx.fillRect(h.x - 1, h.y - 9, 2, 3);
}

function drawGround() {
  // Road
  ctx.fillStyle = '#333';
  ctx.fillRect(0, groundY, W, 40);

  // Road lines
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 8]);
  ctx.beginPath();
  ctx.moveTo(0, groundY + 20);
  ctx.lineTo(W, groundY + 20);
  ctx.stroke();
  ctx.setLineDash([]);

  // Curb
  ctx.fillStyle = '#555';
  ctx.fillRect(0, groundY, W, 3);
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, groundY);
  grad.addColorStop(0, '#0a0a1e');
  grad.addColorStop(0.4, '#141430');
  grad.addColorStop(1, '#1e1e40');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, groundY);

  // Stars
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 97 + 13) % W;
    const sy = (i * 53 + 7) % (groundY * 0.5);
    const twinkle = Math.sin(frameCount * 0.05 + i) > 0.3;
    if (twinkle) {
      ctx.globalAlpha = 0.4 + Math.sin(frameCount * 0.03 + i * 2) * 0.3;
      ctx.fillRect(sx, sy, 1.5, 1.5);
    }
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#eeeebb';
  ctx.beginPath();
  ctx.arc(W - 60, 45, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0a1e';
  ctx.beginPath();
  ctx.arc(W - 52, 40, 16, 0, Math.PI * 2);
  ctx.fill();
}

function drawHUD() {
  // Score
  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 10, 22);

  // Combo
  if (combo > 1) {
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(`COMBO x${combo}!`, 10, 40);
  }

  // Monster HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(W - 160, 8, 150, 14);
  ctx.fillStyle = '#44cc44';
  const mhp = Math.max(0, monster.hp / monster.maxHp);
  ctx.fillRect(W - 159, 9, 148 * mhp, 12);
  ctx.fillStyle = '#fff';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`MONSTER HP: ${Math.max(0, monster.hp)}`, W - 85, 19);

  // Buildings remaining
  const remaining = buildings.filter(b => !b.destroyed).length;
  ctx.fillStyle = '#888';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Buildings: ${remaining}/${buildings.length}`, 10, H - 12);

  // City name
  ctx.fillStyle = '#555';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('Downtown Charlotte, NC', W - 10, H - 12);
}

function drawOverlay(text, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#a78bfa';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(text, W / 2, H / 2 - 10);
  ctx.fillStyle = '#888';
  ctx.font = '14px sans-serif';
  ctx.fillText(sub, W / 2, H / 2 + 20);
  ctx.fillText(`Final Score: ${score}`, W / 2, H / 2 + 45);
  ctx.fillStyle = '#666';
  ctx.font = '12px sans-serif';
  ctx.fillText('Press R to restart', W / 2, H / 2 + 70);
}

function draw() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
  }

  drawSky();
  drawGround();

  // Buildings
  buildings.forEach(drawBuilding);

  // Particles (behind monster)
  particles.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    if (p.isSmoke) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  });

  // Explosions
  explosions.forEach(e => {
    ctx.globalAlpha = e.life / 20;
    const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.radius);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#ffaa22');
    grad.addColorStop(0.7, '#ff4400');
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Monster
  drawMonster();

  // Helicopters
  helicopters.forEach(drawHelicopter);

  // Projectiles
  projectiles.forEach(p => {
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  });

  drawHUD();

  if (gameOver) drawOverlay('MONSTER DEFEATED!', 'The city survives... barely.');
  if (gameWon) drawOverlay('CHARLOTTE DESTROYED!', 'The monster reigns supreme!');

  ctx.restore();
}

// ── Game Loop ───────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
loop();
</script>
