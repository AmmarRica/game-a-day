<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Day 16 – Mooncat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      overflow: hidden;
      touch-action: none;
    }
    nav { width: 100%; max-width: 480px; margin-bottom: 0.5rem; }
    nav a { color: #a78bfa; text-decoration: none; font-size: 0.9rem; }
    h1 { color: #a78bfa; font-size: 1.5rem; margin-bottom: 0.25rem; }
    #info { color: #9ca3af; font-size: 0.85rem; margin-bottom: 0.5rem; text-align: center; }
    canvas {
      background: #0a0a1e;
      border-radius: 8px;
      border: 1px solid #3b3b5c;
      max-width: 480px;
      width: 100%;
      touch-action: none;
    }
    #hud { font-size: 1rem; margin-top: 0.5rem; color: #e0e0ff; }
    #overlay {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(15,15,26,0.95); border: 2px solid #a78bfa; border-radius: 12px;
      padding: 2rem; text-align: center; display: none; z-index: 10;
    }
    #overlay h2 { color: #a78bfa; margin-bottom: 0.5rem; }
    #overlay p { color: #9ca3af; margin-bottom: 1rem; }
    #overlay button {
      background: #a78bfa; color: #0f0f1a; border: none; padding: 0.75rem 2rem;
      border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold;
    }
</style>
</head>
<body>
  <h1>Mooncat</h1>
  <div id="info">Tap left/right to move. Tap top half to jump. Collect crystals, reach the rocket!</div>
  <canvas id="c"></canvas>
  <div id="hud">Crystals: 0/0 | Lives: 3</div>
  <div id="overlay"><h2 id="oTitle"></h2><p id="oText"></p><button id="oBtn">Continue</button></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hudEl = document.getElementById('hud');
const overlay = document.getElementById('overlay');
const oTitle = document.getElementById('oTitle');
const oText = document.getElementById('oText');
const oBtn = document.getElementById('oBtn');

const W = 480, H = 400;
canvas.width = W; canvas.height = H;

const GRAVITY = 0.12; // Low moon gravity!
const JUMP_VEL = -5.5;
const MOVE_SPEED = 3;
const CAT_W = 20, CAT_H = 24;

let level = 0;
let lives = 3;
let crystalsCollected = 0;
let totalCrystals = 0;
let cat = { x: 0, y: 0, vx: 0, vy: 0, onGround: false, facingRight: true, jumpTime: 0 };
let platforms = [];
let crystals = [];
let hazards = [];
let rocket = { x: 0, y: 0 };
let cameraX = 0;
let gameState = 'playing'; // playing, dead, won, allDone
let deathTimer = 0;
let starField = [];
let inputLeft = false, inputRight = false, inputJump = false;
let touchActive = {};

// Starfield
for (let i = 0; i < 80; i++) {
  starField.push({ x: Math.random() * 1200, y: Math.random() * H, s: 0.5 + Math.random() * 2, b: 0.3 + Math.random() * 0.7 });
}

const LEVELS = [
  { // Level 1 - intro
    start: { x: 40, y: 320 },
    rocket: { x: 900, y: 100 },
    platforms: [
      { x: 0, y: 350, w: 200, h: 50 },
      { x: 170, y: 300, w: 80, h: 15 },
      { x: 280, y: 260, w: 100, h: 15 },
      { x: 400, y: 220, w: 80, h: 15 },
      { x: 500, y: 260, w: 120, h: 15 },
      { x: 650, y: 210, w: 80, h: 15 },
      { x: 750, y: 170, w: 100, h: 15 },
      { x: 870, y: 130, w: 100, h: 15 },
    ],
    crystals: [
      { x: 200, y: 270 }, { x: 320, y: 230 }, { x: 430, y: 190 },
      { x: 550, y: 230 }, { x: 690, y: 180 }, { x: 790, y: 140 },
    ],
    hazards: [
      { x: 350, y: 345, w: 30, h: 10, type: 'spike' },
      { x: 600, y: 345, w: 40, h: 10, type: 'spike' },
    ]
  },
  { // Level 2
    start: { x: 40, y: 320 },
    rocket: { x: 1100, y: 80 },
    platforms: [
      { x: 0, y: 350, w: 150, h: 50 },
      { x: 200, y: 310, w: 60, h: 15 },
      { x: 300, y: 270, w: 60, h: 15 },
      { x: 380, y: 310, w: 80, h: 15 },
      { x: 500, y: 260, w: 60, h: 15 },
      { x: 580, y: 200, w: 80, h: 15 },
      { x: 700, y: 240, w: 60, h: 15 },
      { x: 780, y: 180, w: 80, h: 15 },
      { x: 880, y: 140, w: 60, h: 15 },
      { x: 970, y: 180, w: 80, h: 15 },
      { x: 1070, y: 120, w: 100, h: 15 },
    ],
    crystals: [
      { x: 225, y: 280 }, { x: 325, y: 240 }, { x: 420, y: 280 },
      { x: 525, y: 230 }, { x: 620, y: 170 }, { x: 725, y: 210 },
      { x: 820, y: 150 }, { x: 1010, y: 150 },
    ],
    hazards: [
      { x: 440, y: 345, w: 40, h: 10, type: 'spike' },
      { x: 640, y: 345, w: 50, h: 10, type: 'spike' },
      { x: 850, y: 345, w: 40, h: 10, type: 'spike' },
    ]
  },
  { // Level 3
    start: { x: 40, y: 270 },
    rocket: { x: 1300, y: 60 },
    platforms: [
      { x: 0, y: 300, w: 120, h: 50 },
      { x: 160, y: 260, w: 50, h: 15 },
      { x: 250, y: 220, w: 50, h: 15 },
      { x: 340, y: 280, w: 50, h: 15 },
      { x: 420, y: 230, w: 60, h: 15 },
      { x: 520, y: 180, w: 50, h: 15 },
      { x: 600, y: 250, w: 50, h: 15 },
      { x: 680, y: 200, w: 60, h: 15 },
      { x: 780, y: 150, w: 50, h: 15 },
      { x: 870, y: 200, w: 60, h: 15 },
      { x: 960, y: 150, w: 50, h: 15 },
      { x: 1050, y: 110, w: 60, h: 15 },
      { x: 1150, y: 150, w: 60, h: 15 },
      { x: 1260, y: 100, w: 100, h: 15 },
    ],
    crystals: [
      { x: 180, y: 230 }, { x: 270, y: 190 }, { x: 360, y: 250 },
      { x: 450, y: 200 }, { x: 540, y: 150 }, { x: 620, y: 220 },
      { x: 710, y: 170 }, { x: 800, y: 120 }, { x: 900, y: 170 },
      { x: 980, y: 120 }, { x: 1080, y: 80 },
    ],
    hazards: [
      { x: 200, y: 340, w: 30, h: 10, type: 'spike' },
      { x: 450, y: 340, w: 50, h: 10, type: 'spike' },
      { x: 700, y: 340, w: 40, h: 10, type: 'spike' },
      { x: 950, y: 340, w: 50, h: 10, type: 'spike' },
    ]
  },
];

function loadLevel(n) {
  level = n;
  const lvl = LEVELS[n];
  cat.x = lvl.start.x; cat.y = lvl.start.y; cat.vx = 0; cat.vy = 0; cat.onGround = false;
  platforms = lvl.platforms.map(p => ({ ...p }));
  // Add floor segments with gaps
  crystals = lvl.crystals.map(c => ({ ...c, collected: false }));
  hazards = lvl.hazards.map(h => ({ ...h }));
  rocket = { ...lvl.rocket };
  totalCrystals = crystals.length;
  crystalsCollected = 0;
  cameraX = 0;
  gameState = 'playing';
  updateHud();
}

function updateHud() {
  hudEl.textContent = `Crystals: ${crystalsCollected}/${totalCrystals} | Lives: ${lives} | Level ${level + 1}`;
}

function getCanvasPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return { x: (touch.clientX - rect.left) * W / rect.width, y: (touch.clientY - rect.top) * H / rect.height };
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    const pos = getCanvasPos(t);
    const zone = getZone(pos);
    touchActive[t.identifier] = zone;
    applyZone(zone, true);
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    const pos = getCanvasPos(t);
    const oldZone = touchActive[t.identifier];
    const newZone = getZone(pos);
    if (oldZone !== newZone) {
      applyZone(oldZone, false);
      touchActive[t.identifier] = newZone;
      applyZone(newZone, true);
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  for (let t of e.changedTouches) {
    const zone = touchActive[t.identifier];
    applyZone(zone, false);
    delete touchActive[t.identifier];
  }
}, { passive: false });

function getZone(pos) {
  if (pos.y < H * 0.45) return 'jump';
  if (pos.x < W * 0.4) return 'left';
  if (pos.x > W * 0.6) return 'right';
  return 'jump';
}

function applyZone(zone, active) {
  if (zone === 'left') inputLeft = active;
  else if (zone === 'right') inputRight = active;
  else if (zone === 'jump') inputJump = active;
}

// Keyboard fallback
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inputLeft = true;
  if (e.key === 'ArrowRight' || e.key === 'd') inputRight = true;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') inputJump = true;
});
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'a') inputLeft = false;
  if (e.key === 'ArrowRight' || e.key === 'd') inputRight = false;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') inputJump = false;
});

oBtn.addEventListener('click', () => {
  overlay.style.display = 'none';
  if (gameState === 'won') {
    if (level + 1 < LEVELS.length) loadLevel(level + 1);
    else { level = 0; lives = 3; loadLevel(0); }
  } else if (gameState === 'dead') {
    loadLevel(level);
  }
});

function update() {
  if (gameState !== 'playing') return;

  // Movement
  if (inputLeft) { cat.vx = -MOVE_SPEED; cat.facingRight = false; }
  else if (inputRight) { cat.vx = MOVE_SPEED; cat.facingRight = true; }
  else { cat.vx *= 0.8; }

  // Jump (floaty moon jump - can hold for higher)
  if (inputJump && cat.onGround) {
    cat.vy = JUMP_VEL;
    cat.onGround = false;
    cat.jumpTime = 15;
  }
  if (inputJump && cat.jumpTime > 0) {
    cat.vy -= 0.15; // Extended floaty jump
    cat.jumpTime--;
  }
  if (!inputJump) cat.jumpTime = 0;

  // Gravity (low moon gravity)
  cat.vy += GRAVITY;
  cat.x += cat.vx;
  cat.y += cat.vy;
  cat.onGround = false;

  // Platform collisions
  for (let p of platforms) {
    if (cat.x + CAT_W/2 > p.x && cat.x - CAT_W/2 < p.x + p.w) {
      // Landing on top
      if (cat.vy >= 0 && cat.y <= p.y + 2 && cat.y >= p.y - CAT_H) {
        if (cat.y + cat.vy >= p.y - CAT_H) {
          cat.y = p.y - CAT_H;
          cat.vy = 0;
          cat.onGround = true;
        }
      }
      // Hitting bottom
      else if (cat.vy < 0 && cat.y - CAT_H < p.y + p.h && cat.y > p.y + p.h) {
        cat.y = p.y + p.h + CAT_H;
        cat.vy = 0;
      }
    }
    // Side collisions
    if (cat.y > p.y - CAT_H + 4 && cat.y < p.y + p.h - 4) {
      if (cat.x + CAT_W/2 > p.x && cat.x - CAT_W/2 < p.x && cat.vx > 0) {
        cat.x = p.x - CAT_W/2;
      }
      if (cat.x - CAT_W/2 < p.x + p.w && cat.x + CAT_W/2 > p.x + p.w && cat.vx < 0) {
        cat.x = p.x + p.w + CAT_W/2;
      }
    }
  }

  // Collect crystals
  for (let c of crystals) {
    if (!c.collected && Math.hypot(cat.x - c.x, (cat.y - CAT_H/2) - c.y) < 20) {
      c.collected = true;
      crystalsCollected++;
      updateHud();
    }
  }

  // Hazard check
  for (let h of hazards) {
    if (cat.x + CAT_W/2 > h.x && cat.x - CAT_W/2 < h.x + h.w &&
        cat.y > h.y - CAT_H && cat.y < h.y + h.h) {
      die();
      return;
    }
  }

  // Fall death
  if (cat.y > H + 50) {
    die();
    return;
  }

  // Reach rocket
  if (Math.hypot(cat.x - rocket.x, (cat.y - CAT_H/2) - rocket.y) < 35) {
    gameState = 'won';
    if (level + 1 >= LEVELS.length) {
      oTitle.textContent = 'Mission Complete!';
      oText.textContent = `You escaped the moon! Crystals: ${crystalsCollected}/${totalCrystals}`;
      oBtn.textContent = 'Play Again';
    } else {
      oTitle.textContent = 'Level Clear!';
      oText.textContent = `Crystals: ${crystalsCollected}/${totalCrystals}`;
      oBtn.textContent = 'Next Level';
    }
    overlay.style.display = 'block';
  }

  // Camera
  const targetCamX = cat.x - W / 3;
  cameraX += (targetCamX - cameraX) * 0.08;
  if (cameraX < 0) cameraX = 0;
}

function die() {
  lives--;
  updateHud();
  if (lives <= 0) {
    gameState = 'dead';
    oTitle.textContent = 'Game Over';
    oText.textContent = 'Out of lives!';
    oBtn.textContent = 'Retry';
    lives = 3;
    overlay.style.display = 'block';
  } else {
    gameState = 'dead';
    oTitle.textContent = 'Ouch!';
    oText.textContent = `Lives remaining: ${lives}`;
    oBtn.textContent = 'Try Again';
    overlay.style.display = 'block';
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Deep space background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050510'); grad.addColorStop(1, '#0a0a2e');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Stars (parallax)
  for (let s of starField) {
    const sx = ((s.x - cameraX * 0.2) % (W + 100) + W + 100) % (W + 100) - 50;
    ctx.fillStyle = `rgba(255,255,255,${s.b})`;
    ctx.fillRect(sx, s.y, s.s, s.s);
  }

  // Earth in sky
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath(); ctx.arc(W - 80 - cameraX * 0.02, 60, 25, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#22c55e';
  ctx.beginPath(); ctx.arc(W - 85 - cameraX * 0.02, 55, 8, 0, Math.PI * 2); ctx.fill();

  ctx.save();
  ctx.translate(-cameraX, 0);

  // Moon surface (ground line)
  ctx.fillStyle = '#2a2a3e';
  ctx.fillRect(-100, H - 50, 2000, 60);
  ctx.fillStyle = '#3a3a4e';
  // Craters
  for (let i = 0; i < 15; i++) {
    const cx = i * 100 + 30, cy = H - 40;
    ctx.beginPath(); ctx.ellipse(cx, cy, 15 + (i % 3) * 5, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#222235'; ctx.fill();
  }

  // Platforms
  for (let p of platforms) {
    ctx.fillStyle = '#4a4a6a';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#5a5a7a';
    ctx.fillRect(p.x, p.y, p.w, 3);
    // Surface details
    ctx.fillStyle = '#3a3a5a';
    for (let dx = 5; dx < p.w - 5; dx += 12) {
      ctx.fillRect(p.x + dx, p.y + 5, 6, 2);
    }
  }

  // Hazards (spikes)
  for (let h of hazards) {
    ctx.fillStyle = '#ef4444';
    const spikeCount = Math.floor(h.w / 10);
    for (let i = 0; i < spikeCount; i++) {
      ctx.beginPath();
      ctx.moveTo(h.x + i * 10, h.y + h.h);
      ctx.lineTo(h.x + i * 10 + 5, h.y - 8);
      ctx.lineTo(h.x + i * 10 + 10, h.y + h.h);
      ctx.closePath(); ctx.fill();
    }
  }

  // Crystals
  const time = Date.now() / 1000;
  for (let c of crystals) {
    if (c.collected) continue;
    const bobY = Math.sin(time * 3 + c.x) * 4;
    ctx.fillStyle = '#a78bfa';
    ctx.save();
    ctx.translate(c.x, c.y + bobY);
    ctx.rotate(time * 2);
    ctx.beginPath();
    ctx.moveTo(0, -8); ctx.lineTo(6, 0); ctx.lineTo(0, 8); ctx.lineTo(-6, 0);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c4b5fd';
    ctx.beginPath();
    ctx.moveTo(0, -5); ctx.lineTo(3, 0); ctx.lineTo(0, 5); ctx.lineTo(-3, 0);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // Glow
    ctx.fillStyle = 'rgba(167,139,250,0.15)';
    ctx.beginPath(); ctx.arc(c.x, c.y + bobY, 15, 0, Math.PI * 2); ctx.fill();
  }

  // Rocket
  ctx.fillStyle = '#9ca3af';
  ctx.fillRect(rocket.x - 12, rocket.y - 25, 24, 50);
  ctx.fillStyle = '#ef4444';
  ctx.beginPath();
  ctx.moveTo(rocket.x - 12, rocket.y - 25);
  ctx.lineTo(rocket.x, rocket.y - 45);
  ctx.lineTo(rocket.x + 12, rocket.y - 25);
  ctx.closePath(); ctx.fill();
  // Fins
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath();
  ctx.moveTo(rocket.x - 12, rocket.y + 20);
  ctx.lineTo(rocket.x - 22, rocket.y + 30);
  ctx.lineTo(rocket.x - 12, rocket.y + 10);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(rocket.x + 12, rocket.y + 20);
  ctx.lineTo(rocket.x + 22, rocket.y + 30);
  ctx.lineTo(rocket.x + 12, rocket.y + 10);
  ctx.closePath(); ctx.fill();
  // Window
  ctx.fillStyle = '#60a5fa';
  ctx.beginPath(); ctx.arc(rocket.x, rocket.y - 8, 6, 0, Math.PI * 2); ctx.fill();
  // Flame animation
  if (Math.random() > 0.3) {
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.moveTo(rocket.x - 8, rocket.y + 25);
    ctx.lineTo(rocket.x, rocket.y + 35 + Math.random() * 10);
    ctx.lineTo(rocket.x + 8, rocket.y + 25);
    ctx.closePath(); ctx.fill();
  }

  // Cat
  drawCat(cat.x, cat.y, cat.facingRight, cat.onGround);

  ctx.restore();

  // Touch zone indicators (subtle)
  ctx.fillStyle = 'rgba(167,139,250,0.05)';
  if (inputLeft) { ctx.fillRect(0, H * 0.45, W * 0.4, H * 0.55); }
  if (inputRight) { ctx.fillRect(W * 0.6, H * 0.45, W * 0.4, H * 0.55); }
  if (inputJump) { ctx.fillRect(0, 0, W, H * 0.45); }

  // Touch zone labels
  ctx.fillStyle = 'rgba(167,139,250,0.15)';
  ctx.font = '12px system-ui'; ctx.textAlign = 'center';
  ctx.fillText('< LEFT', W * 0.2, H - 15);
  ctx.fillText('RIGHT >', W * 0.8, H - 15);
  ctx.fillText('^ JUMP', W * 0.5, 20);
}

function drawCat(x, y, facingRight, onGround) {
  const dir = facingRight ? 1 : -1;
  // Body
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(x - 8, y - CAT_H + 6, 16, 18);
  // Head
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath(); ctx.arc(x, y - CAT_H + 4, 10, 0, Math.PI * 2); ctx.fill();
  // Ears
  ctx.beginPath();
  ctx.moveTo(x - 8, y - CAT_H - 2);
  ctx.lineTo(x - 4, y - CAT_H - 12);
  ctx.lineTo(x - 1, y - CAT_H - 2);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 8, y - CAT_H - 2);
  ctx.lineTo(x + 4, y - CAT_H - 12);
  ctx.lineTo(x + 1, y - CAT_H - 2);
  ctx.closePath(); ctx.fill();
  // Inner ears
  ctx.fillStyle = '#f59e0b';
  ctx.beginPath();
  ctx.moveTo(x - 6, y - CAT_H);
  ctx.lineTo(x - 4, y - CAT_H - 8);
  ctx.lineTo(x - 2, y - CAT_H);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x + 6, y - CAT_H);
  ctx.lineTo(x + 4, y - CAT_H - 8);
  ctx.lineTo(x + 2, y - CAT_H);
  ctx.closePath(); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 3 * dir - 1, y - CAT_H + 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3 * dir + 1, y - CAT_H + 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(x - 3 * dir - 1 + dir, y - CAT_H + 2, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 3 * dir + 1 + dir, y - CAT_H + 2, 1.5, 0, Math.PI * 2); ctx.fill();
  // Nose
  ctx.fillStyle = '#f59e0b';
  ctx.beginPath(); ctx.arc(x + dir * 2, y - CAT_H + 5, 1.5, 0, Math.PI * 2); ctx.fill();
  // Tail
  ctx.strokeStyle = '#fbbf24';
  ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - dir * 8, y - 6);
  ctx.quadraticCurveTo(x - dir * 18, y - 15, x - dir * 14, y - 22);
  ctx.stroke();
  // Legs
  const legAnim = onGround ? 0 : Math.sin(Date.now() / 100) * 3;
  ctx.fillStyle = '#f59e0b';
  ctx.fillRect(x - 7, y - 4 + legAnim, 5, 5);
  ctx.fillRect(x + 2, y - 4 - legAnim, 5, 5);
  // Helmet (moon suit!)
  ctx.strokeStyle = 'rgba(167,139,250,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(x, y - CAT_H + 4, 12, 0, Math.PI * 2); ctx.stroke();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

loadLevel(0);
gameLoop();
</script>
